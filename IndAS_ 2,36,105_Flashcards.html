const STORAGE_KEY = 'indas_progress_v1';

function loadProgress() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : { known: [], unknown: [] }; }
  catch(e) { return { known: [], unknown: [] }; }
}
function saveProgress(known, unknown) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ known: [...known], unknown: [...unknown] })); } catch(e) {}
}

const cards = [
  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  // IND AS 2 вЂ“ INVENTORIES
  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  { id:1, standard:"Ind AS 2", category:"Concept", difficulty:"Basic", exam:true,
    front:"Ind AS 2 вЂ“ Objective & Scope\n\nWhat is the objective of Ind AS 2?\nWhich inventories are EXCLUDED from its scope?",
    back:"Objective: Prescribe accounting treatment for inventories вЂ” how to determine cost, recognise it as an expense (including write-down to NRV), and which cost formula to apply.\n\nExcludes from scope entirely:\n(a) Financial instruments (Ind AS 32 & 109)\n(b) Biological assets related to agricultural activity (Ind AS 41)\n\nExcludes from MEASUREMENT only:\n(a) Producers of agricultural & forest products, minerals вЂ” measured at NRV per industry practice\n(b) Commodity broker-traders вЂ” measured at FV less costs to sell\n\nChanges in NRV / FV less costs to sell в†’ recognised in P&L in the period of change." },

  { id:2, standard:"Ind AS 2", category:"Concept", difficulty:"Basic", exam:true,
    front:"Ind AS 2 вЂ“ Key Definitions\n\nDefine: Inventories | Net Realisable Value | Fair Value\n\nState the key difference between NRV and Fair Value.",
    back:"Inventories: Assets held for SALE in ordinary course of business (finished goods); in process of production for such sale (WIP); or materials/supplies to be CONSUMED in production or rendering of services.\n\nNRV: Estimated selling price in ordinary course of business LESS estimated costs of completion LESS estimated costs to make the sale.\nв†’ Entity-specific value.\n\nFair Value: Price received to sell an asset in an orderly transaction between market participants at measurement date (Ind AS 113).\nв†’ Market-based measurement.\n\nKey difference:\nвЂў NRV = what THIS entity expects to realise\nвЂў FV = what market participants would pay\nвЂў NRV for inventories may NOT equal Fair Value less costs to sell\n\nExample: Market FV = в‚№10, order in hand @ в‚№11, incremental cost = в‚№0.50 в†’ FV = в‚№10, NRV = в‚№10.50" },

  { id:3, standard:"Ind AS 2", category:"Concept", difficulty:"Basic", exam:true,
    front:"Ind AS 2 вЂ“ Measurement Principle\n\nAt what value are inventories measured?\nState the 3 components that make up the COST of inventories.",
    back:"Measurement: Inventories shall be measured at the LOWER OF COST and NET REALISABLE VALUE.\n\nCost of Inventories comprises:\n\n1. Costs of Purchase\n   вЂў Purchase price + import duties + non-recoverable taxes + transport & handling\n   вЂў Less: trade discounts, rebates and similar items\n   (Settlement/cash discounts в†’ NOT deducted from cost)\n\n2. Costs of Conversion\n   вЂў Direct materials, direct labour, other direct costs\n   вЂў Systematic allocation of fixed & variable production overheads\n\n3. Other Costs\n   вЂў Only if incurred in bringing inventories to present location & condition\n   вЂў Borrowing costs в†’ only if qualifies as qualifying asset under Ind AS 23\n   вЂў Deferred payment в†’ financing element recognised as interest expense, NOT added to inventory" },

  { id:4, standard:"Ind AS 2", category:"Concept", difficulty:"Intermediate", exam:true,
    front:"Ind AS 2 вЂ“ Fixed Production Overheads\n\nHow are FIXED production overheads allocated?\nWhat happens when actual production is BELOW normal capacity? ABOVE?",
    back:"Fixed O/H: Relatively constant regardless of production volume (e.g., factory depreciation, factory management).\n\nAllocation basis: NORMAL CAPACITY\nвЂў Normal capacity = average production expected over several periods under normal circumstances (accounting for planned maintenance)\n\nIf AP = NC:\nв†’ Allocated fixed O/H = Total fixed O/H в†’ в‚№0 unallocated\n\nIf AP < NC (abnormally low):\nв†’ Rate = Total FO/H Г· NC (maintained)\nв†’ Allocated to inventory = AP Г— rate\nв†’ UNALLOCATED O/H в†’ expensed to P&L immediately\n\nIf AP > NC (abnormally high):\nв†’ Rate = Total FO/H Г· AP (reduced)\nв†’ All O/H absorbed в†’ в‚№0 expensed separately\nв†’ Inventory per unit reduced so inventory в‰¤ cost\n\nVariable O/H: Allocated on basis of ACTUAL USE of production facilities.\n\nрџ“Њ NEVER over-absorb fixed overheads into inventory." },

  { id:5, standard:"Ind AS 2", category:"Concept", difficulty:"Basic", exam:false,
    front:"Ind AS 2 вЂ“ Costs EXCLUDED from Inventory\n\nList the costs that must be EXCLUDED from inventory cost and expensed in the period incurred.",
    back:"Must NEVER be included in inventory cost:\n\n(a) Abnormal amounts of wasted materials, labour or other production costs\n\n(b) Storage costs вЂ” UNLESS necessary in the production process BEFORE a further production stage\n   вњ… Ageing of whiskey in cask (essential to product)\n   вќЊ Warehouse storage of finished goods\n\n(c) Administrative overheads NOT contributing to bringing inventories to present location & condition\n\n(d) Selling costs\n   Including: sales commission, distribution costs, after-sale warranty, advertising\n\n(e) Financing element in deferred payment (в†’ interest expense)\n\nрџ“Њ Common exam traps:\nвњ… Import duties, freight, brokerage to indenting agents, insurance on purchases в†’ INCLUDED\nвќЊ Accounts dept salaries, sales commission, warranty costs в†’ P&L expense" },

  { id:6, standard:"Ind AS 2", category:"Concept", difficulty:"Intermediate", exam:false,
    front:"Ind AS 2 вЂ“ Joint Products & By-Products\n\nHow is cost allocated when a process produces joint products?\nHow are by-products treated?",
    back:"Joint Products:\n\nIf conversion costs are SEPARATELY identifiable:\nв†’ Each product bears its own separately identified cost\n\nIf costs are NOT separately identifiable:\nв†’ Allocate on RATIONAL & CONSISTENT basis:\n   вЂў Relative sales value at split-off point, OR\n   вЂў Relative sales value at completion of production\n\nBy-Products:\n\nImmaterial by-product:\nв†’ Measured at NRV\nв†’ NRV deducted from COST OF MAIN PRODUCT\nв†’ Carrying amount of main product = not materially different from its cost\n\nMaterial by-product:\nв†’ Treated as a JOINT PRODUCT\nв†’ Costs allocated on rational & consistent basis\n\nScrap/waste:\nв†’ Usually immaterial в†’ measured at NRV в†’ deducted from joint cost\n\nрџ“Њ By-product NRV always reduces cost of main product first." },

  { id:7, standard:"Ind AS 2", category:"Concept", difficulty:"Basic", exam:true,
    front:"Ind AS 2 вЂ“ Cost Formulas\n\nWhat are the permitted cost formulas?\nWhich is NOT permitted? Why?\nState the consistency rule.",
    back:"Permitted formulas:\n\n1. FIFO (First-In, First-Out):\n   Items purchased/produced first в†’ sold first\n   Closing inventory = most recently purchased costs\n\n2. Weighted Average Cost:\n   Average cost of similar items at beginning + purchased during period\n   Computed periodically or after each receipt (moving average)\n   Formula: (Cost in store + Cost of new items) Г· (Units in store + New units)\n\n3. Specific Identification:\n   Actual cost attributed to individually identified items\n   Used for: non-interchangeable items, goods for specific projects\n   Examples: Jewellery, tailor-made goods\n\nNOT Permitted: LIFO\nв†’ Inventory values may bear little relationship to recent cost levels\n\nConsistency rule:\nв†’ SAME formula for all inventories of SIMILAR nature and use\nв†’ DIFFERENT nature or use в†’ may justify different formula\nв†’ Different geographic location ALONE в†’ does NOT justify different formula" },

  { id:8, standard:"Ind AS 2", category:"Concept", difficulty:"Basic", exam:true,
    front:"Ind AS 2 вЂ“ Cost Measurement Techniques\n\nName and describe the two TECHNIQUES allowed for measuring cost of inventories.",
    back:"Two approximation techniques are permitted if results approximate actual cost:\n\n1. Standard Cost Method:\n   вЂў Cost based on NORMAL levels of materials & supplies, labour efficiency, capacity utilisation\n   вЂў Standards regularly reviewed and revised\n   вЂў Used for manufacturing companies with reliable data\n\n2. Retail Method:\n   вЂў Used in retail industry for large numbers of rapidly changing items with similar margins\n   вЂў Cost = Sales value of inventory LESS appropriate gross margin %\n   вЂў % takes into account inventory marked down below original selling price\n   вЂў An average % for each retail department often used\n\nрџ“Њ Key difference:\nвЂў Techniques = approximation methods to arrive at cost\nвЂў Cost formulas (FIFO/WA) = how to assign actual costs to specific units" },

  { id:9, standard:"Ind AS 2", category:"Concept", difficulty:"Intermediate", exam:true,
    front:"Ind AS 2 вЂ“ Service Provider Inventories\n\nHow does Ind AS 2 apply to inventories of SERVICE PROVIDERS?\nWhat costs are included vs excluded?",
    back:"Service provider inventories = described as WORK IN PROGRESS.\n\nCost includes:\nвњ… Labour and other costs of PERSONNEL DIRECTLY engaged in providing the service (including supervisory)\nвњ… ATTRIBUTABLE OVERHEADS\n\nCost excludes:\nвќЊ Labour relating to SALES and GENERAL ADMINISTRATIVE personnel\nвќЊ Profit margins\n\nRecognition:\nв†’ WIP accumulates only for INCOMPLETE services\nв†’ Once service is complete / revenue recognised в†’ recognised as COST OF SERVICES (expense)\n\nBalance sheet:\nв†’ Described as 'Work in Progress'\n\nExample:\nConsulting firm accumulates staff costs + directly attributable overheads for an incomplete engagement as WIP в†’ expensed when engagement completes and revenue is recognised." },

  { id:10, standard:"Ind AS 2", category:"Concept", difficulty:"Intermediate", exam:true,
    front:"Ind AS 2 вЂ“ Agricultural Produce & Deferred Payment\n\nHow is agricultural produce initially measured at harvest?\n\nAlso: How is a FINANCING ELEMENT in deferred payment treated?",
    back:"Agricultural produce (Ind AS 41 interface):\n\nв†’ Harvested produce measured at FAIR VALUE LESS COSTS TO SELL at point of harvest\nв†’ This FV less costs to sell = DEEMED COST for Ind AS 2 purposes\nв†’ From harvest date: normal Ind AS 2 rules apply (lower of deemed cost and NRV)\n\nExamples: Cotton, grapes, timber вЂ” all measured at FV less CTS at harvest, then Ind AS 2 applies thereafter.\n\nDeferred Payment (financing element):\n\nWhen arrangement contains a financing element:\nв†’ Inventory recorded at the CASH PRICE EQUIVALENT\nв†’ Difference between deferred price and cash price = INTEREST EXPENSE over financing period\n\nExample:\nвЂў Deferred price: в‚№3,00,000 (в‚№25,000/month Г— 12)\nвЂў Cash price: в‚№2,80,000\nвЂў Financing element: в‚№20,000 в†’ interest expense\nвЂў Inventory cost: в‚№2,80,000\n\nBorrowing costs (Ind AS 23):\nв†’ Included ONLY if inventory is a qualifying asset (substantial period to get ready)\nв†’ Large quantities on REPETITIVE basis в†’ NOT qualifying assets" },

  { id:11, standard:"Ind AS 2", category:"Theory Q&A", difficulty:"Intermediate", exam:true,
    front:"Ind AS 2 вЂ“ NRV: Firm Sales Contracts\n\nAn entity holds 100 units. Firm contract to sell 60 units @ в‚№11/unit (incremental selling cost в‚№1/unit). Market price for remaining 40 units = в‚№8/unit (incremental cost в‚№1/unit). Cost = в‚№10/unit.\n\nCalculate NRV and inventory value for each group.",
    back:"Rule: NRV estimates take into account the PURPOSE for which inventory is held.\n\nв†’ Inventory under FIRM SALES CONTRACTS в†’ NRV based on CONTRACT PRICE\nв†’ EXCESS inventory в†’ NRV based on GENERAL SELLING PRICES\n\nApplication:\n\n60 units (under firm contract):\nв†’ NRV = в‚№11 в€’ в‚№1 = в‚№10/unit\nв†’ Cost = в‚№10/unit в†’ Lower of cost/NRV = в‚№10 в†’ No write-down\nв†’ Inventory value = 60 Г— в‚№10 = в‚№600\n\n40 units (excess вЂ” no firm contract):\nв†’ NRV = в‚№8 в€’ в‚№1 = в‚№7/unit\nв†’ Cost = в‚№10/unit в†’ NRV < Cost в†’ Write-down to в‚№7\nв†’ Inventory value = 40 Г— в‚№7 = в‚№280\n\nTotal inventory = в‚№600 + в‚№280 = в‚№880\nWrite-down recognised = 40 Г— в‚№3 = в‚№120\n\nрџ“Њ If firm contracts are for MORE than inventory held в†’ consider Ind AS 37 onerous contract provisions for the shortfall." },

  { id:12, standard:"Ind AS 2", category:"Concept", difficulty:"Intermediate", exam:true,
    front:"Ind AS 2 вЂ“ NRV: Writing Down Raw Materials\n\nAn entity holds raw materials. The selling price of FINISHED GOODS has fallen below cost. Should the raw materials be written down?\n\nWhat is the measure of NRV for raw materials?",
    back:"General rule: Raw materials NOT written down below cost if finished goods are expected to be sold AT OR ABOVE COST.\n\nException вЂ“ write-down applies:\nDecline in price of raw materials indicates cost of finished product will EXCEED its NRV в†’ raw materials ARE written down to NRV.\n\nMeasure of NRV for raw materials:\nв†’ REPLACEMENT COST is the best available measure of NRV\n(Cannot determine a selling price for raw materials in isolation when they feed into multiple products)\n\nImportant:\nв†’ No write-down just because anticipated profit will be LESS THAN NORMAL\nв†’ Write-down only if finished goods expected to be sold AT A LOSS\n\nDiagram:\nвЂў Finished goods sold at or above cost в†’ Raw materials at COST\nвЂў Finished goods sold below cost (at NRV) в†’ Raw materials at REPLACEMENT COST (= NRV proxy)" },

  { id:13, standard:"Ind AS 2", category:"Concept", difficulty:"Intermediate", exam:false,
    front:"Ind AS 2 вЂ“ NRV Write-Down Reversal\n\nWhen is a previous write-down REVERSED?\nWhat is the ceiling for reversal?",
    back:"Reversal trigger:\nNew assessment of NRV in each subsequent period shows circumstances previously causing write-down NO LONGER EXIST, or there is clear evidence of INCREASE in NRV.\n\nReversal amount:\nв†’ Limited to the amount of the ORIGINAL WRITE-DOWN\nв†’ New carrying amount = LOWER of (original cost) and (revised NRV)\n\nRecognition:\nв†’ Recognised as a REDUCTION in inventory expense in the period of reversal\n\nExample:\nв†’ Item written down from в‚№50 (cost) to в‚№25 (NRV)\nв†’ Next year NRV rises to в‚№60\nв†’ Reversal = в‚№25 (restoring to cost of в‚№50, NOT to в‚№60)\nв†’ New carrying amount = в‚№50 (original cost)\n\nрџ“Њ Write-down done item by item. Reversal also item by item.\nрџ“Њ Passage of time alone (without changed circumstances) в†’ NOT sufficient." },

  { id:14, standard:"Ind AS 2", category:"Concept", difficulty:"Basic", exam:true,
    front:"Ind AS 2 вЂ“ Recognition as Expense & Disclosure\n\nHow is inventory carrying amount recognised as expense?\nList the 5 key DISCLOSURE requirements.",
    back:"Recognition as Expense:\nв†’ Carrying amount of inventories sold в†’ recognised in period related REVENUE is recognised\nв†’ Write-downs to NRV + losses в†’ expense in period incurred\nв†’ Reversals в†’ reduce inventory expense in period of reversal\n\nNote: Inventory used in self-constructed PPE в†’ capitalised, then depreciated over useful life of PPE.\n\n5 Key Disclosures:\n1. Accounting policies (including COST FORMULA used)\n2. Total carrying amount + carrying amount by classification (merchandise, production supplies, materials, WIP, finished goods)\n3. Carrying amount of inventories carried at FV less costs to sell\n4. Amount recognised as expense; write-down amounts; reversal amounts + circumstances\n5. Carrying amount of inventories PLEDGED AS SECURITY for liabilities" },

  { id:15, standard:"Ind AS 2", category:"Theory Q&A", difficulty:"Basic", exam:true,
    front:"Ind AS 2 вЂ“ Practical: Cost of Purchase\n\nA company buys 1,000 units. Quoted price в‚№1,200/unit; trade discount 5%; settlement discount 2% (intends to take); import duty в‚№60/unit; delivery в‚№5,000.\n\nCalculate cost of inventory. Which discount is deducted?",
    back:"Cost of inventory calculation:\n\nPurchase price: 1,000 Г— в‚№1,200 Г— 95% = в‚№11,40,000\nImport duties: 1,000 Г— в‚№60         = в‚№60,000\nDelivery cost                       = в‚№5,000\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nCost of inventory                   = в‚№12,05,000\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n\nCost per unit = в‚№12,05,000 Г· 1,000 = в‚№1,205/unit\n\nрџ“Њ KEY RULES:\nв†’ TRADE DISCOUNT (5%) в†’ DEDUCTED вњ… (reduces purchase price)\nв†’ SETTLEMENT/CASH DISCOUNT (2%) в†’ NOT DEDUCTED вќЊ\n   Even though entity intends to take it, cash discounts are NOT deducted from inventory cost. They represent a financial decision, not a trade price reduction.\nв†’ Import duties в†’ INCLUDED вњ…\nв†’ Delivery/freight в†’ INCLUDED вњ…\n\nрџ“Њ Exam trap: Only TRADE discounts reduce cost. Settlement discounts do not." },

  { id:16, standard:"Ind AS 2", category:"Theory Q&A", difficulty:"Basic", exam:false,
    front:"Ind AS 2 вЂ“ Primary vs Secondary Packing & Variable Overheads\n\nDistinguish primary and secondary packing. Which is included in inventory cost?\n\nAlso: How are VARIABLE production overheads allocated?",
    back:"Primary packing material:\nв†’ ESSENTIAL to bring inventory to SALEABLE CONDITION\nв†’ Without it, product cannot be sold (e.g., bottles/cans for food, sealed packets for medicines)\nв†’ INCLUDED in cost of inventories вњ…\n\nSecondary packing material:\nв†’ Used for TRANSPORTING and FORWARDING after product is saleable (outer cartons, shipping crates)\nв†’ Nature of SELLING COST в†’ EXCLUDED вќЊ\nв†’ Recognised as expense in P&L\n\nPublicity/marketing materials в†’ EXCLUDED вќЊ (selling costs)\n\nTest: Does the packing make the product SALEABLE? вњ… Or facilitate DELIVERY of an already-saleable product? вќЊ\n\nVariable production overheads:\nв†’ Vary directly (or nearly directly) with volume of production\nв†’ Examples: Indirect materials, indirect labour\nв†’ Allocation basis: ACTUAL USE of production facilities\nв†’ Always fully absorbed вЂ” no concept of under-absorption for variable overheads under Ind AS 2" },

  { id:17, standard:"Ind AS 2", category:"Formula", difficulty:"Basic", exam:true,
    front:"Ind AS 2 вЂ“ Formula Card: NRV & Weighted Average\n\n1. Write the NRV formula\n2. Write the inventory write-down formula\n3. Write the weighted average cost formula after a new purchase",
    back:"1. Net Realisable Value:\nNRV = Estimated Selling Price в€’ Estimated Costs of Completion в€’ Estimated Costs to Make the Sale\n\n(Trade discounts expected в†’ deducted from selling price)\n(Cash discounts for prompt payment в†’ NOT deducted)\n\n2. Inventory Write-Down:\nWrite-down = Cost в€’ NRV (only when NRV < Cost; applied item by item)\n\n3. New Weighted Average after purchase:\nNew WA = (Cost of units in store + Cost of new items received)\n         Г· (Units in store + New units received)\n\nExample:\nвЂў In store: 25 units @ в‚№2.10 = в‚№52.50\nвЂў New receipt: 150 units @ в‚№2.80 = в‚№420.00\nвЂў New WA = (в‚№52.50 + в‚№420) Г· (25 + 150) = в‚№472.50 Г· 175 = в‚№2.70 per unit\n\nрџ“Њ Under moving average: new WA computed after each purchase. Sales at most recent WA." },

  { id:18, standard:"Ind AS 2", category:"Formula", difficulty:"Intermediate", exam:true,
    front:"Ind AS 2 вЂ“ Formula Card: Fixed Overhead Absorption\n\nNormal capacity = 1,00,000 units. Total fixed O/H = в‚№15,00,000.\n\nCase 1: Actual = 1,00,000\nCase 2: Actual = 75,000\nCase 3: Actual = 1,25,000\n\nFor each: (a) O/H per unit in inventory, (b) Amount expensed to P&L",
    back:"Fixed O/H rate (based on NC) = в‚№15,00,000 Г· 1,00,000 = в‚№15/unit\n\nCase 1: AP = NC = 1,00,000\n(a) в‚№15 per unit\n(b) в‚№0 expensed (fully absorbed)\n\nCase 2: AP = 75,000 < NC\n(a) в‚№15 per unit (normal rate maintained)\n(b) Allocated = 75,000 Г— в‚№15 = в‚№11,25,000\n    Expensed to P&L = в‚№15,00,000 в€’ в‚№11,25,000 = в‚№3,75,000\n    (Unabsorbed overheads в†’ P&L immediately)\n\nCase 3: AP = 1,25,000 > NC\n(a) в‚№12 per unit (= в‚№15,00,000 Г· 1,25,000)\n    (Rate reduced so inventory not above cost)\n(b) All в‚№15,00,000 absorbed в†’ в‚№0 expensed separately\n\nрџ“Њ Rule: Inventory per unit = в‚№15 in Case 1 & 2. Reduced in Case 3. Unallocated O/H always в†’ P&L." },

  { id:19, standard:"Ind AS 2", category:"Quick Fire", difficulty:"Basic", exam:true,
    front:"Ind AS 2 вЂ“ Quick Fire\n\n1. LIFO is ___ under Ind AS 2.\n2. NRV estimates take into account events ___ period end that confirm conditions ___ at period end.\n3. Write-down is done on ___ basis, NOT ___ basis.\n4. Storage costs included in inventory ONLY if ___.\n5. Settlement discounts ___ deducted from cost.",
    back:"1. LIFO is NOT PERMITTED under Ind AS 2.\n\n2. NRV estimates take into account events AFTER period end that confirm conditions EXISTING at period end.\n\n3. Write-down is done on ITEM-BY-ITEM basis, NOT total inventory or classification basis.\n\n4. Storage costs included in inventory ONLY if necessary in the PRODUCTION PROCESS before a further production stage.\n\n5. Settlement discounts are NOT deducted from cost.\n   (Only TRADE discounts are deducted.)\n\nBonus:\nв†’ By-product NRV в†’ deducted from MAIN PRODUCT cost\nв†’ Retail method: cost = sales value LESS appropriate gross margin %\nв†’ Same cost formula must be used for inventories of similar nature and use\nв†’ Agricultural produce at harvest = FV less costs to sell = DEEMED COST for Ind AS 2" },

  { id:20, standard:"Ind AS 2", category:"Theory Q&A", difficulty:"Basic", exam:false,
    front:"Ind AS 2 вЂ“ AS 2 vs Ind AS 2: Key Differences\n\nState 4 significant differences between Ind AS 2 and old AS 2.",
    back:"1. Subsequent Recognition:\n   Ind AS 2 в†’ explicitly deals with subsequent recognition of carrying amount as expense\n   AS 2 в†’ does NOT provide the same\n\n2. Commodity Broker-Traders:\n   Ind AS 2 в†’ scopes out measurement of inventories held by commodity broker-traders (FV less costs to sell)\n   AS 2 в†’ no such provision\n\n3. Definition of Fair Value & Distinction from NRV:\n   Ind AS 2 в†’ defines FV; explains difference between NRV and FV\n   AS 2 в†’ does not contain FV definition\n\n4. NRV Reversal:\n   Ind AS 2 в†’ detailed guidance on subsequent NRV assessment + reversal (limited to original write-down)\n   AS 2 в†’ does not deal with reversal\n\n5. Cost Formulas:\n   Ind AS 2 в†’ requires consistent formula for inventories of similar nature and use\n   AS 2 в†’ formula should 'reflect fairest possible approximation to cost incurred'\n\n6. LIFO:\n   Both Ind AS 2 and AS 2 в†’ PROHIBIT LIFO" },

  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  // IND AS 36 вЂ“ IMPAIRMENT OF ASSETS
  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  { id:21, standard:"Ind AS 36", category:"Concept", difficulty:"Basic", exam:true,
    front:"Ind AS 36 вЂ“ Objective & Scope\n\nWhat is the objective?\nList 6 asset types EXCLUDED from scope.",
    back:"Objective: Ensure assets are carried at NO MORE than their RECOVERABLE AMOUNT. Prescribe when to recognise and reverse impairment losses.\n\nExcludes from scope:\n(a) Inventories (Ind AS 2)\n(b) Contract assets & costs to obtain/fulfill contracts (Ind AS 115)\n(c) Deferred tax assets (Ind AS 12)\n(d) Employee benefit assets (Ind AS 19)\n(e) Financial assets (Ind AS 109)\n(f) Non-current assets held for sale (Ind AS 105)\n(g) Biological assets at FV less costs to sell (Ind AS 41)\n(h) Insurance acquisition cash flows (Ind AS 117)\n\nApplies to:\nвЂў PPE, intangible assets, investment property (cost model)\nвЂў Investments in subsidiaries, associates, JVs (separate FS)\nвЂў Goodwill from business combinations\n\nNote: All excluded assets are covered by other Ind AS with equivalent impairment provisions." },

  { id:22, standard:"Ind AS 36", category:"Concept", difficulty:"Basic", exam:true,
    front:"Ind AS 36 вЂ“ Key Definitions\n\nDefine:\nвЂў Impairment Loss\nвЂў Recoverable Amount\nвЂў Cash-Generating Unit (CGU)\nвЂў Value in Use\nвЂў Carrying Amount\nвЂў Corporate Assets\nвЂў Costs of Disposal",
    back:"Impairment Loss: Amount by which CARRYING AMOUNT > RECOVERABLE AMOUNT\nFormula: IL = CA в€’ RA\n\nRecoverable Amount: HIGHER of FVLCD and VIU\n(If either exceeds CA в†’ asset not impaired)\n\nCGU: Smallest identifiable GROUP of assets generating cash inflows LARGELY INDEPENDENT of other assets/groups.\n\nValue in Use: PRESENT VALUE of future cash flows expected from an asset or CGU.\n\nCarrying Amount: Amount at which asset is recognised AFTER deducting accumulated depreciation and accumulated impairment losses.\n\nCorporate Assets: Assets OTHER than goodwill contributing to future cash flows of BOTH the CGU under review AND other CGUs. (e.g., head office, EDP equipment, research centre)\n\nCosts of Disposal: Incremental costs directly attributable to disposal, EXCLUDING finance costs & income tax." },

  { id:23, standard:"Ind AS 36", category:"Concept", difficulty:"Basic", exam:true,
    front:"Ind AS 36 вЂ“ When to Test for Impairment\n\nName the 3 assets requiring MANDATORY ANNUAL impairment test.\nFor all other assets: when must impairment be assessed?",
    back:"3 Assets requiring MANDATORY ANNUAL test (regardless of indicators):\n1. Intangible assets with INDEFINITE useful life\n2. Intangible assets NOT YET AVAILABLE for use\n3. Goodwill acquired in a business combination\n\nKey rule for these 3:\nв†’ Test can be performed at any time during the year, but SAME TIME every year\nв†’ Different intangibles may be tested at different times\nв†’ If acquired in current period в†’ must be tested before end of current annual period\nв†’ May roll forward previous calculation if: CGU unchanged + substantial headroom + remote likelihood of impairment\n\nFor ALL OTHER assets:\nв†’ Assess at END OF EACH REPORTING PERIOD for any INDICATION of impairment\nв†’ If indication exists в†’ estimate recoverable amount\nв†’ No indication в†’ no formal calculation needed\n\nрџ“Њ The 3 mandatory-annual assets need testing even if there are NO indicators of impairment." },

  { id:24, standard:"Ind AS 36", category:"Concept", difficulty:"Intermediate", exam:true,
    front:"Ind AS 36 вЂ“ Indicators of Impairment\n\nList the EXTERNAL and INTERNAL sources of impairment indicators.",
    back:"EXTERNAL sources (4):\n(a) Asset's market value has DECLINED SIGNIFICANTLY вЂ” more than expected from passage of time or normal use\n(b) Significant ADVERSE CHANGES in technological, market, economic, or legal environment\n(c) Market INTEREST RATES have INCREASED вЂ” likely to materially affect discount rate in VIU\n(d) Carrying amount of net assets > MARKET CAPITALISATION\n\nINTERNAL sources (3):\n(a) Evidence of OBSOLESCENCE or PHYSICAL DAMAGE\n(b) Significant adverse changes in EXTENT or MANNER of use (asset becoming idle, plans to discontinue/restructure, plans to dispose before expected date, reassessing useful life from indefinite to finite)\n(c) INTERNAL REPORTING data shows economic performance worse than expected (actual cash flows significantly worse than budgeted, operating losses, etc.)\n\nInvestment in subsidiary/associate/JV:\n(d) Dividend received > total comprehensive income of investee\n(e) Carrying amount in separate FS > carrying amounts in consolidated FS" },

  { id:25, standard:"Ind AS 36", category:"Concept", difficulty:"Basic", exam:true,
    front:"Ind AS 36 вЂ“ Recoverable Amount & FVLCD\n\nWhat is Fair Value Less Costs of Disposal (FVLCD)?\nWhat costs are DEDUCTED vs NOT deducted?",
    back:"FVLCD = Fair Value (per Ind AS 113) MINUS Costs of Disposal\n\nFair Value: Price received to sell asset in orderly transaction between market participants.\n\nCosts of disposal DEDUCTED:\nвњ… Legal costs\nвњ… Stamp duty and similar transaction taxes\nвњ… Costs of removing the asset\nвњ… Direct incremental costs to bring asset into condition for sale\n(Only if NOT already recognised as liabilities)\n\nNOT deducted:\nвќЊ Termination benefits (Ind AS 19)\nвќЊ Costs of reducing/reorganising business following disposal\n\nWhen only one needs to be calculated:\nв†’ If FVLCD > CA в†’ not impaired в†’ no need to calculate VIU\nв†’ If no reliable basis for FVLCD в†’ use VIU alone\n\nFV vs VIU distinction:\nвЂў FV в†’ market participant assumptions (entity-neutral)\nвЂў VIU в†’ entity-specific synergies and legal rights" },

  { id:26, standard:"Ind AS 36", category:"Concept", difficulty:"Intermediate", exam:true,
    front:"Ind AS 36 вЂ“ Value in Use (VIU)\n\nWhat is VIU? State the key rules for cash flow projections.\nWhat must be EXCLUDED from VIU cash flows?\nWhat is the discount rate requirement?",
    back:"VIU: Present value of FUTURE CASH FLOWS expected from an asset or CGU.\n\nCash flow projection rules:\n(a) Based on reasonable & supportable assumptions; GREATER WEIGHT to external evidence\n(b) Based on most recent management-approved budgets/forecasts вЂ” max 5 YEARS (unless longer justified)\n(c) Beyond 5-year period в†’ steady or DECLINING growth rate (not exceeding long-term industry/country average)\n\nCash flows INCLUDED:\nвњ… Inflows from continuing use\nвњ… Outflows necessarily incurred to generate those inflows\nвњ… Net cash flows from disposal at end of useful life\n\nCash flows EXCLUDED:\nвќЊ Future restructurings NOT YET COMMITTED\nвќЊ Improving or ENHANCING asset's performance\nвќЊ Cash flows from FINANCING activities\nвќЊ INCOME TAX receipts or payments (pre-tax basis)\n\nDiscount rate:\nв†’ PRE-TAX rate reflecting current market assessments of time value of money + asset-specific risks\nв†’ Surrogates: entity's WACC or incremental borrowing rate (adjusted to pre-tax, asset-specific)" },

  { id:27, standard:"Ind AS 36", category:"Concept", difficulty:"Intermediate", exam:true,
    front:"Ind AS 36 вЂ“ Recognition of Impairment Loss\n\nHow is impairment loss recognised for COST MODEL vs REVALUED ASSET?\nWhat happens to depreciation AFTER recognition?",
    back:"When Recoverable Amount < Carrying Amount в†’ recognise impairment loss.\n\nCost model asset:\nв†’ Impairment loss recognised IMMEDIATELY in Profit or Loss\n\nRevalued asset (Ind AS 16 or Ind AS 38):\nв†’ FIRST: offset against existing REVALUATION SURPLUS for that asset (in OCI)\nв†’ EXCESS over revaluation surplus в†’ recognised in P&L\n\nPost-recognition depreciation:\nв†’ Depreciation charge ADJUSTED in future periods\nв†’ New depreciation = (Revised CA в€’ Residual value) Г· Remaining useful life\n\nOther points:\nв†’ Deferred tax recalculated comparing revised CA with tax base\nв†’ If impairment loss > CA в†’ recognise a liability if required by another standard\n\nExample:\nRevised CA = в‚№10,000; Residual = в‚№500; Remaining life = 5 years\nNew annual dep = (в‚№10,000 в€’ в‚№500) Г· 5 = в‚№1,900" },

  { id:28, standard:"Ind AS 36", category:"Concept", difficulty:"Basic", exam:true,
    front:"Ind AS 36 вЂ“ Cash-Generating Units (CGUs)\n\nWhat is a CGU? When is recoverable amount determined at CGU level?\nWhat does the carrying amount of a CGU include / exclude?",
    back:"CGU: Smallest identifiable group of assets generating cash inflows LARGELY INDEPENDENT of cash inflows from other assets/groups.\n\nWhen to use CGU:\nв†’ Individual asset cannot generate cash inflows independently (e.g., machine only usable as part of production line)\nв†’ UNLESS: asset's FVLCD > CA, or VIU в‰€ FVLCD\n\nCarrying amount of CGU INCLUDES:\nвњ… Assets directly attributed or allocated on reasonable & consistent basis\nвњ… Assets generating the future cash inflows used in CGU's VIU calculation\n\nCarrying amount of CGU EXCLUDES:\nвќЊ Recognised liabilities (UNLESS recoverable amount cannot be determined without considering them)\nвќЊ Goodwill and corporate assets в†’ tested separately with special rules\n\nIdentifying CGUs:\nв†’ Consistent with how management monitors operations\nв†’ Can be as small as one asset or as large as a reportable segment\n\nрџ“Њ A bus route = one CGU (even though individual buses do not generate independent cash inflows)." },

  { id:29, standard:"Ind AS 36", category:"Concept", difficulty:"Intermediate", exam:true,
    front:"Ind AS 36 вЂ“ Goodwill Impairment Testing\n\nHow is goodwill ALLOCATED to CGUs?\nState the ORDER of testing when CGU assets and goodwill tested simultaneously.\nHow is impairment loss allocated within a CGU?",
    back:"Goodwill allocation:\nв†’ To CGUs/groups of CGUs EXPECTED TO BENEFIT from synergies of the combination\nв†’ Lowest level at which management monitors goodwill; not larger than an operating segment\nв†’ Pro-rata method: Goodwill to CGU = (Purchase consideration allocated to CGU Г· Total purchase consideration) Г— Total goodwill\n\nOrder of testing (bottom-up):\n1. FIRST test individual assets within CGU в†’ recognise any impairment losses\n2. THEN test the CGU including goodwill в†’ recognise impairment at CGU level\n\nImpairment loss allocation order:\n(a) FIRST в†’ reduce carrying amount of GOODWILL to zero\n(b) THEN в†’ reduce other assets PRO RATA based on carrying amounts\n\nFloor per individual asset:\nCA cannot be reduced below HIGHEST of:\nв†’ FVLCD (if determinable)\nв†’ VIU (if determinable)\nв†’ ZERO\n\nExcess over floor в†’ reallocated pro rata to other assets in CGU.\n\nрџ“Њ CRITICAL: Goodwill impairment CANNOT BE REVERSED." },

  { id:30, standard:"Ind AS 36", category:"Concept", difficulty:"Intermediate", exam:false,
    front:"Ind AS 36 вЂ“ Corporate Assets & NCI Goodwill\n\nHow are corporate assets tested for impairment?\n\nExplain the NCI goodwill 'GROSSING UP' concept.",
    back:"Corporate assets: OTHER than goodwill; contribute to cash flows of BOTH CGU under review AND other CGUs.\n\nScenario A вЂ” CA can be allocated to CGU on reasonable & consistent basis:\nв†’ Include portion in CGU's carrying amount в†’ test enlarged CGU against RA\n\nScenario B вЂ” CA CANNOT be allocated:\nв†’ Step 1: Test individual CGU without corporate asset\nв†’ Step 2: Identify SMALLEST GROUP of CGUs to which CA can be allocated\nв†’ Step 3: Test that group (including CA) against group's RA\n\nNCI Goodwill Grossing Up (partial goodwill method):\nв†’ Under Ind AS 103, if NCI measured at proportionate share, only PARENT'S goodwill recognised\nв†’ CGU carrying amount = net assets (parent + NCI) + parent's goodwill only\nв†’ But recoverable amount reflects FULL economic entity\nв†’ Solution: GROSS UP goodwill = Recognised goodwill Г· Parent's % Г— NCI %\nв†’ Compare grossed-up CA with RA\nв†’ If impaired: total IL calculated on grossed-up basis\nв†’ Only impairment on PARENT'S share recognised in CFS\nв†’ NCI portion of unrecognised goodwill impairment в†’ NOT recognised" },

  { id:31, standard:"Ind AS 36", category:"Concept", difficulty:"Intermediate", exam:true,
    front:"Ind AS 36 вЂ“ Reversal of Impairment Loss\n\nWhen can an impairment loss be reversed?\nState rules for: (a) Individual asset, (b) CGU, (c) Goodwill.",
    back:"General condition: Change in ESTIMATES used to determine recoverable amount.\nвљ пёЏ Passage of time alone в†’ NOT sufficient.\n\n(a) Individual asset reversal:\nв†’ Increased CA shall NOT exceed CA had NO impairment been recognised (net of dep/amortisation)\nв†’ Cost model в†’ recognised in P&L\nв†’ Revalued model в†’ recognised in OCI (reversal of prior OCI charge) or P&L (if prior impairment was in P&L)\nв†’ After reversal: adjust depreciation going forward\n\n(b) CGU reversal:\nв†’ Allocate reversal PRO RATA to assets (EXCEPT goodwill) based on carrying amounts\nв†’ Each asset's CA not increased above LOWER of:\n   (i) its RA\n   (ii) CA had no impairment been recognised (net of dep)\nв†’ Excess в†’ reallocated pro rata to remaining assets\n\n(c) Goodwill:\nв†’ IMPAIRMENT LOSS ON GOODWILL CANNOT BE REVERSED вЂ” EVER.\n\nрџ“Њ Reversal ceiling = CA that would have existed (net of dep) HAD NO IMPAIRMENT been recognised." },

  { id:32, standard:"Ind AS 36", category:"Concept", difficulty:"Intermediate", exam:false,
    front:"Ind AS 36 вЂ“ Goodwill on Partial Disposal & Rolling Forward\n\nHow is goodwill derecognised when PART of a CGU is disposed?\n\nWhen can previous period's recoverable amount be ROLLED FORWARD?",
    back:"Goodwill on partial disposal:\nв†’ Goodwill associated with disposed operation в†’ included in carrying amount of disposed operation\nв†’ Measured on basis of RELATIVE VALUES of:\n   (i) Operation disposed of, and\n   (ii) Portion of CGU retained\nв†’ Unless entity can demonstrate another method better reflects associated goodwill\n\nExample: Entity sells operation for в‚№100; RA of retained portion = в‚№300.\nTotal value = в‚№400. Goodwill on disposed = 100/400 = 25% of total goodwill.\n\nRolling Forward (previous calculation reused):\nPermitted only if ALL 3 criteria met:\n(a) UNCHANGED CGU: assets/liabilities have not changed significantly since last calculation\n(b) SUBSTANTIAL HEADROOM: last RA exceeded CA by substantial margin\n(c) REMOTE LIKELIHOOD: likelihood that current RA < CA is remote\n\nрџ“Њ If any of the 3 criteria is NOT met в†’ fresh calculation required.\nрџ“Њ This provision reduces cost of annual goodwill impairment testing." },

  { id:33, standard:"Ind AS 36", category:"Quick Fire", difficulty:"Basic", exam:true,
    front:"Ind AS 36 вЂ“ Quick Fire\n\n1. Recoverable amount = ___\n2. VIU discount rate must be a ___ rate\n3. VIU cash flow projections: max period = ___\n4. Impairment allocated to goodwill: ___ (first/last?)\n5. Goodwill impairment: reversible? ___\n6. Three assets tested annually: ___",
    back:"1. Recoverable amount = HIGHER of (FVLCD) and (Value in Use)\n\n2. VIU discount rate = PRE-TAX rate (time value + asset-specific risks)\n\n3. VIU cash flow projections: max 5 YEARS (unless longer justified by track record)\n\n4. Impairment allocated to goodwill: FIRST (before other assets in CGU)\n\n5. Goodwill impairment: NO вЂ” NEVER reversible\n\n6. Three assets tested annually:\n   вЂў Intangible with INDEFINITE useful life\n   вЂў Intangible NOT YET AVAILABLE for use\n   вЂў Goodwill from business combination\n\nBonus:\nв†’ Partial goodwill (NCI at proportionate share) в†’ GROSS UP for impairment test\nв†’ Only parent's share of goodwill impairment recognised in CFS\nв†’ Corporate assets tested in context of CGU or group of CGUs (never in isolation)" },

  { id:34, standard:"Ind AS 36", category:"Formula", difficulty:"Intermediate", exam:true,
    front:"Ind AS 36 вЂ“ Formula Card\n\n1. Impairment Loss formula\n2. Revised Depreciation after Impairment\n3. Reversal ceiling formula\n\nWith a worked example for reversal ceiling.",
    back:"1. Impairment Loss:\nIL = Carrying Amount в€’ Recoverable Amount\n(Recognise only when CA > RA)\n\n2. Recoverable Amount:\nRA = MAX (Fair Value Less Costs of Disposal, Value in Use)\n\n3. Revised Depreciation after Impairment:\nNew Dep = (Revised CA в€’ Residual Value) Г· Remaining Useful Life\n\nExample: Revised CA = в‚№10,000; Residual = в‚№500; Remaining life = 5 yrs\nNew Dep = (10,000 в€’ 500) Г· 5 = в‚№1,900 per annum\n\n4. Reversal Ceiling:\nMax CA after reversal =\nHistorical Cost в€’ Accumulated dep AS IF no impairment had ever been recognised\n\nExample:\nCost = в‚№3,20,000 | Life = 20 years | Impairment at Year 4\nCA had no impairment = в‚№3,20,000 в€’ (в‚№3,20,000/20 Г— 4) = в‚№3,20,000 в€’ в‚№64,000 = в‚№2,56,000\nв†’ Reversal cannot increase CA above в‚№2,56,000" },

  { id:35, standard:"Ind AS 36", category:"Theory Q&A", difficulty:"Intermediate", exam:false,
    front:"Ind AS 36 вЂ“ Disclosure Requirements\n\nWhat must be disclosed when an impairment loss or reversal has been recognised?",
    back:"For each material impairment loss or reversal:\n1. Events and circumstances leading to recognition\n2. Amount of IL or reversal\n3. Class of asset or description of CGU and segment\n4. Whether RA = FVLCD or VIU\n5. If FVLCD в†’ valuation technique and key assumptions\n6. If VIU в†’ discount rate(s) used in current and prior estimate\n\nFor CGUs with significant goodwill or indefinite-life intangibles:\n7. Carrying amount of goodwill allocated to the CGU\n8. Carrying amount of indefinite-life intangibles allocated\n9. Basis of RA determination (VIU or FVLCD)\n10. Key assumptions in cash flow projections\n11. Management's approach to each key assumption\n12. Period over which CFs projected and justification if > 5 years\n13. Growth rate used beyond budget period + justification\n14. Discount rate(s) applied\n15. Sensitivity вЂ” if reasonably possible change would cause impairment\n\nAggregate disclosures required even if no individual impairment is material." },

  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  // IND AS 105 вЂ“ HELD FOR SALE & DISCONTINUED OPS
  // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  { id:36, standard:"Ind AS 105", category:"Concept", difficulty:"Basic", exam:true,
    front:"Ind AS 105 вЂ“ Objective & Scope\n\nWhat are the 2 core objectives?\nWhich assets are scoped OUT of MEASUREMENT provisions?",
    back:"Two core objectives:\n1. Accounting for non-current assets (or disposal groups) HELD FOR SALE\n   в†’ Measurement: lower of CA and FVLCTS\n   в†’ Presentation: separately in balance sheet as CURRENT asset\n\n2. Accounting for DISCONTINUED OPERATIONS\n   в†’ Results presented as single amount in P&L, separately from continuing operations\n\nScoped out of MEASUREMENT provisions only:\n(Still classified as HFS / in disclosure scope)\nв†’ Deferred tax assets (Ind AS 12)\nв†’ Financial assets (Ind AS 109)\nв†’ Biological assets at FV less costs to sell (Ind AS 41)\nв†’ Contractual rights (Ind AS 104)\nв†’ Employee benefit assets (Ind AS 19)\n\nрџ“Њ Ind AS 105 applies to NON-CURRENT assets only when sold individually.\nрџ“Њ A CURRENT asset sold individually в†’ NEVER classified as HFS under Ind AS 105.\nрџ“Њ Current assets forming part of a DISPOSAL GROUP в†’ included in the group." },

  { id:37, standard:"Ind AS 105", category:"Concept", difficulty:"Basic", exam:true,
    front:"Ind AS 105 вЂ“ Key Definitions\n\nDefine:\nвЂў Non-current asset\nвЂў Disposal group\nвЂў Discontinued operation\nвЂў Highly probable\nвЂў Firm purchase commitment",
    back:"Non-current asset: Asset NOT meeting definition of current asset (not realisable within 12 months / operating cycle, not primarily for trading).\n\nDisposal group: Group of assets to be disposed TOGETHER IN A SINGLE TRANSACTION + directly associated liabilities. May be a CGU, single CGU, or part of CGU.\nв†’ Includes goodwill if CGU to which goodwill allocated (Ind AS 36).\n\nDiscontinued operation: COMPONENT of entity that either has been disposed of OR classified as HFS AND represents:\n(a) Separate major line of business or geographical area, OR\n(b) Part of coordinated plan to dispose of such, OR\n(c) Subsidiary acquired EXCLUSIVELY WITH A VIEW TO RESALE\n\nHighly probable: Significantly more likely than probable. (Probable = more likely than not.)\n\nFirm purchase commitment: Legally enforceable agreement with UNRELATED party; specifies all significant terms (price, timing); includes sufficient disincentive for non-performance." },

  { id:38, standard:"Ind AS 105", category:"Concept", difficulty:"Basic", exam:true,
    front:"Ind AS 105 вЂ“ Classification as Held for Sale\n\nState the 2 KEY REQUIREMENTS.\nList the 5 criteria for HIGHLY PROBABLE.",
    back:"2 KEY REQUIREMENTS:\n1. AVAILABLE FOR IMMEDIATE SALE in its present condition\n   (On terms usual and customary for sales of such assets)\n2. SALE IS HIGHLY PROBABLE\n\n5 Criteria for HIGHLY PROBABLE:\n(1) Appropriate level of management COMMITTED TO PLAN to sell\n(2) ACTIVE PROGRAMME to locate a buyer has been initiated\n(3) Asset actively MARKETED at price REASONABLE relative to current FV\n(4) Sale expected to be completed within ONE YEAR from date of classification\n(5) SIGNIFICANT CHANGES OR WITHDRAWAL from the plan are unlikely\n\nAdditional: Shareholders' approval (if required in jurisdiction) must be considered.\n\nрџ“Њ 'Available for immediate sale' does NOT mean immediate transfer вЂ” usual customary terms (e.g., time to vacate a building) are acceptable.\n\nрџ“Њ Asset being REFURBISHED to enhance value в†’ NOT available for immediate sale.\n\nрџ“Њ If sold individually, Ind AS 105 applies ONLY to NON-CURRENT assets." },

  { id:39, standard:"Ind AS 105", category:"Theory Q&A", difficulty:"Intermediate", exam:true,
    front:"Ind AS 105 вЂ“ One-Year Rule Exceptions\n\nThe normal rule: sale must complete within ONE YEAR of classification. State the 2 general conditions AND 3 specific circumstances where beyond one year is acceptable.",
    back:"General conditions (BOTH must be met):\n(i) Delay caused by EVENTS OR CIRCUMSTANCES BEYOND entity's control\n(ii) SUFFICIENT EVIDENCE entity remains committed to selling plan\n\n3 Specific circumstances:\n\n1. Buyer requires LONGER PERIOD for regulatory/other approvals\nв†’ Entity has firm purchase commitment AND active programme\nв†’ Example: Mining entity committed to sell; regulatory approval takes > 1 year; firm commitment highly probable within 1 year\n\n2. Unexpected CONDITIONS raised by buyer or regulatory body requiring ADDITIONAL TIME\nв†’ Entity actively RESPONDS to resolve conditions\nв†’ Expected to resolve within reasonable period\nв†’ Example: Firm commitment obtained but buyer inspection reveals environmental damage; entity making good the damage\n\n3. Assets/liabilities must be SEPARATED from other assets/liabilities before legal sale\nв†’ Entity has firm commitment AND active programme\n\nрџ“Њ These are NARROW exceptions. If conditions not met в†’ asset reclassified out of HFS.\nрџ“Њ Market conditions deteriorating + no reasonable offers + price reduced в†’ still qualifies if entity continues to actively market at reasonable price." },

  { id:40, standard:"Ind AS 105", category:"Concept", difficulty:"Basic", exam:false,
    front:"Ind AS 105 вЂ“ Assets to be Abandoned\n\nCan assets to be ABANDONED be classified as held for sale?\nWhat about assets TEMPORARILY taken out of use?",
    back:"Assets to be ABANDONED:\nв†’ CANNOT be classified as held for sale\nв†’ Reason: CA recovered through CONTINUING USE, not sale\nв†’ Exception: If disposal group to be abandoned meets criteria for DISCONTINUED OPERATION в†’ disclosure requirements apply\n\nAssets to be abandoned include:\nвЂў Assets to be used to end of economic life\nвЂў Assets to be CLOSED rather than sold\n\nAssets TEMPORARILY taken out of use:\nв†’ CANNOT be classified as abandoned\nв†’ Example: Factory idle due to low demand but maintained in workable condition and expected to restart в†’ neither abandoned nor HFS\nв†’ Depreciation CONTINUES (CA recovered through future use)\n\nSummary:\n| Situation | HFS? | Depreciation |\n|---|---|---|\n| Held for sale (criteria met) | вњ… Yes | STOPS |\n| To be abandoned | вќЊ No | Continues |\n| Temporarily idle | вќЊ No | Continues |" },

  { id:41, standard:"Ind AS 105", category:"Concept", difficulty:"Basic", exam:true,
    front:"Ind AS 105 вЂ“ Measurement of Assets Held for Sale\n\nAt what amount are non-current assets classified as HFS measured?\nWhat happens to DEPRECIATION?\nWhat if sale > 1 year away?",
    back:"Measurement: LOWER of:\n(1) CARRYING AMOUNT (measured per applicable Ind AS immediately before classification)\n(2) FAIR VALUE LESS COSTS TO SELL (FVLCTS)\n\nIf FVLCTS < CA в†’ write-down to FVLCTS в†’ IMPAIRMENT LOSS in P&L\nIf FVLCTS > CA в†’ no write-up\n\nFor newly acquired disposal group as part of business combination:\nв†’ Measured at FVLCTS\n\nDepreciation/Amortisation:\nв†’ CEASES when asset classified as held for sale\nв†’ Interest & other expenses of disposal group LIABILITIES в†’ continue to accrue\n\nIf sale expected BEYOND one year:\nв†’ Costs to sell в†’ measured at PRESENT VALUE\nв†’ Increase in PV of costs to sell в†’ presented as FINANCING COST\n\nрџ“Њ Cessation of depreciation is a critical distinguishing feature.\nрџ“Њ The asset is first measured per applicable Ind AS IMMEDIATELY BEFORE classification, then compared to FVLCTS." },

  { id:42, standard:"Ind AS 105", category:"Concept", difficulty:"Intermediate", exam:true,
    front:"Ind AS 105 вЂ“ Subsequent Measurement & Reversal\n\nHow is the asset remeasured at subsequent reporting dates?\nCan a GAIN be recognised? Under what limit?",
    back:"Subsequent measurement:\nв†’ Reassessed at each reporting date\nв†’ Asset continues at LOWER of CA and FVLCTS\nв†’ Further write-down if FVLCTS decreases в†’ additional impairment in P&L\n\nReversal / Gain recognition:\nв†’ If FVLCTS INCREASES after previous write-down:\nв†’ Gain may be recognised, BUT limited to CUMULATIVE IMPAIRMENT LOSSES previously recognised under:\n   вЂў Ind AS 105 (HFS impairment), AND\n   вЂў Ind AS 36 (prior impairment before HFS classification)\nв†’ Any gain above cumulative losses в†’ NOT recognised\n\nFor disposal groups:\nв†’ Scoped-out assets (Ind AS 109, 12, 2, 19) в†’ remeasured per own standards BEFORE comparing disposal group FVLCTS\nв†’ Impairment allocated to in-scope assets in order:\n   (i) First reduce GOODWILL of disposal group to zero\n   (ii) Then pro rata to other non-current assets in measurement scope\nв†’ Scoped-out assets NOT allocated any impairment\n\nрџ“Њ On actual sale в†’ full gain/loss on disposal recognised normally in P&L." },

  { id:43, standard:"Ind AS 105", category:"Theory Q&A", difficulty:"Intermediate", exam:true,
    front:"Ind AS 105 вЂ“ Reclassification Out of HFS\n\nAn asset classified as HFS no longer meets the criteria. How is it remeasured on reclassification?",
    back:"Remeasurement on reclassification (criteria no longer met):\n\nAsset measured at LOWER of:\n(1) CA BEFORE HFS classification, ADJUSTED for:\n   в†’ Depreciation/amortisation that WOULD HAVE BEEN recognised had asset NOT been classified as HFS (notional depreciation catch-up)\n   в†’ Any revaluations that would have been recognised\n(2) RECOVERABLE AMOUNT at the date of decision not to sell\n\nRecognition:\nв†’ Adjustment included in P&L from CONTINUING OPERATIONS in the period criteria no longer met\nв†’ Same caption as gains/losses on HFS items (not meeting discontinued operations definition)\n\nIf previously part of DISCONTINUED OPERATION:\nв†’ Results previously classified as discontinued в†’ reclassified as CONTINUING OPERATIONS\nв†’ Prior period comparative P&L в†’ RESTATED\n\nрџ“Њ Entity cannot 'enjoy' the depreciation holiday вЂ” on reclassification, asset brought down as if depreciation had continued normally.\nрџ“Њ Lower of (adjusted CA) and (recoverable amount) prevents windfall gains on reclassification." },

  { id:44, standard:"Ind AS 105", category:"Concept", difficulty:"Basic", exam:true,
    front:"Ind AS 105 вЂ“ Presentation in the Balance Sheet\n\nHow are HFS assets presented? How are liabilities of a disposal group presented?",
    back:"Presentation of assets:\nв†’ Presented SEPARATELY from other assets in balance sheet\nв†’ Classified as CURRENT ASSETS\nв†’ Major classes of assets в†’ disclosed separately in balance sheet or notes\n\nPresentation of liabilities:\nв†’ Presented SEPARATELY from other liabilities\nв†’ Must NOT be OFFSET against assets (cannot show as single net amount)\nв†’ Major classes в†’ disclosed separately in balance sheet or notes\n\nException: Newly acquired subsidiary classified as HFS on acquisition в†’ major class disclosure not required\n\nOther rules:\nв†’ Prior period comparative balance sheet NOT reclassified to show HFS classification\nв†’ Any cumulative income/expense in OCI relating to HFS asset в†’ presented separately\n\nрџ“Њ Summary:\nвЂў Assets в†’ separate line, current assets section вњ…\nвЂў Liabilities в†’ separate line, not offset against assets вњ…\nвЂў Prior period BS в†’ NOT restated вќЊ\nвЂў Prior period P&L (discontinued ops) в†’ RESTATED вњ…" },

  { id:45, standard:"Ind AS 105", category:"Concept", difficulty:"Intermediate", exam:true,
    front:"Ind AS 105 вЂ“ Loss of Control in a Subsidiary\n\nAn entity commits to a sale plan involving LOSS OF CONTROL of a subsidiary. What classification and presentation rules apply?",
    back:"When committed to sale plan involving LOSS OF CONTROL:\nв†’ ALL assets and liabilities of that subsidiary must be classified as HELD FOR SALE\nв†’ Applies REGARDLESS of whether entity retains a non-controlling interest after sale\n\nClassification criteria: Standard HFS criteria still apply:\nв†’ Available for immediate sale, sale is highly probable, completion within 1 year\n\nPresentation in consolidated balance sheet:\nв†’ All assets of subsidiary в†’ single line 'Assets classified as held for sale' (current assets)\nв†’ All liabilities в†’ single line 'Liabilities directly associated with assets classified as held for sale'\nв†’ Assets and liabilities presented SEPARATELY (NOT netted)\n\nPartial disposal (NO loss of control):\nв†’ Only individual assets/liabilities that individually meet criteria are classified as HFS\nв†’ Full subsidiary not classified\n\nрџ“Њ Key trigger = LOSS OF CONTROL, not just any sale of shares.\nрџ“Њ Even if some assets/liabilities of subsidiary are scoped out of measurement в†’ still classified in disposal group and presented as HFS." },

  { id:46, standard:"Ind AS 105", category:"Concept", difficulty:"Basic", exam:true,
    front:"Ind AS 105 вЂ“ Discontinued Operations: Definition & P&L Presentation\n\nWhat qualifies as a discontinued operation?\nHow are its results presented in P&L?",
    back:"Discontinued operation: COMPONENT of entity that either has been disposed of OR classified as HFS AND represents:\n(a) Separate MAJOR LINE OF BUSINESS or geographical area, OR\n(b) Part of SINGLE COORDINATED PLAN to dispose of such, OR\n(c) Subsidiary acquired EXCLUSIVELY WITH A VIEW TO RESALE\n\nComponent = operations and cash flows clearly distinguishable operationally and for financial reporting from rest of entity.\n\nP&L Presentation:\nв†’ SINGLE AMOUNT on face of P&L comprising total of:\n   вЂў Post-tax P&L from discontinued operation\n   вЂў Post-tax gain/loss on disposal (or remeasurement to FVLCTS)\n\nв†’ ANALYSIS of this single amount в†’ disclosed in NOTES or in P&L:\n   вЂў Revenue, expenses, pre-tax P&L\n   вЂў Related income tax expense\n   вЂў Gain/loss on disposal/remeasurement + related income tax\n\nв†’ Comparative P&L: MUST BE RE-PRESENTED to show discontinued operations separately\n   (Even if not classified as discontinued in prior period)\n\nрџ“Њ Single-line presentation keeps continuing operations 'clean' for analysis." },

  { id:47, standard:"Ind AS 105", category:"Concept", difficulty:"Intermediate", exam:true,
    front:"Ind AS 105 вЂ“ What Does NOT Qualify as a Discontinued Operation?\n\nGive examples of situations that do NOT qualify, even if significant.",
    back:"Does NOT qualify (fails to meet component/major line test):\n\n1. Winding down while COMPLETING EXISTING CONTRACTS:\nв†’ Group closes engineering contracting segment\nв†’ No new contracts, but existing contracts being completed\nв†’ During wind-down period в†’ still earning revenue в†’ CONTINUING OPERATION\nв†’ Only qualifies as discontinued ONCE the final contract is completed\n\n2. Shifting production location:\nв†’ Moving factory from one state to another\nв†’ Same line of business continues в†’ NOT a separate major line or geographic area\n\n3. Eliminating ONE PRODUCT LINE within a segment:\nв†’ Discontinuing a product, but the segment continues\nв†’ NOT a 'separate major line of business'\n\n4. Partial disposal NOT involving loss of control:\nв†’ Selling a 10% stake (retaining 60% control)\nв†’ NOT a discontinued operation\n\nрџ“Њ Key two-part test:\n(1) Component being DISPOSED OF (sold or HFS)? AND\n(2) Does it represent a SEPARATE MAJOR LINE or geographical area?\nBoth required simultaneously." },

  { id:48, standard:"Ind AS 105", category:"Concept", difficulty:"Intermediate", exam:true,
    front:"Ind AS 105 вЂ“ Comparative Restatement\n\nWhat comparative restatement is required for DISCONTINUED OPERATIONS in P&L?\nIs there comparative restatement in the BALANCE SHEET?",
    back:"PROFIT AND LOSS вЂ” Comparative RESTATEMENT REQUIRED:\nв†’ When component classified as discontinued in CURRENT period в†’ re-present prior period comparative P&L to show discontinued operations as SINGLE AMOUNT (separate from continuing operations)\nв†’ Applies even if NOT classified as discontinued in prior period\nв†’ Purpose: allows users to see 'clean' continuing operations for both periods (comparability)\n\nBALANCE SHEET вЂ” NO Comparative Restatement:\nв†’ Non-current assets/disposal groups classified as HFS в†’ NOT reclassified in prior period balance sheets\nв†’ Appear as separate line items ONLY from the period of first classification\nв†’ Exception: applicable Ind AS requires restatement (rare)\n\nCash flow statement:\nв†’ No specific requirement to restate comparative cash flows\nв†’ Disclosure of cash flows from discontinued operations in notes is required\n\nрџ“Њ Summary:\nвЂў P&L comparatives: RESTATED вњ…\nвЂў Balance sheet comparatives: NOT restated вќЊ\nвЂў Cash flows: Disclosure in notes вњ…" },

  { id:49, standard:"Ind AS 105", category:"Concept", difficulty:"Intermediate", exam:false,
    front:"Ind AS 105 вЂ“ Held for Distribution to Owners\n\nWhat is held for distribution? How does it differ from held for sale?",
    back:"Held for distribution to owners:\nв†’ Entity intends to distribute asset to its owners (shareholders) вЂ” NOT sell to third party\n\nClassification criteria (same as HFS, adapted):\nв†’ Available for IMMEDIATE DISTRIBUTION in present condition\nв†’ Distribution highly probable:\n   (1) Management committed to plan\n   (2) Shareholders' approval obtained (if required)\n   (3) Distribution expected within ONE YEAR\n\nMeasurement:\nв†’ LOWER of (CA) and (FAIR VALUE LESS COSTS TO DISTRIBUTE)\n   [NOT 'costs to sell' вЂ” different concept]\n\nCosts to distribute = incremental costs directly attributable to distribution, excluding finance costs and income tax.\n\nDepreciation: CEASES on classification as held for distribution.\n\nPresentation: Presented separately from other assets (similar to HFS).\n\nKey difference:\n| | Held for Sale | Held for Distribution |\n|---|---|---|\n| Recovery | Through SALE (cash) | Through DISTRIBUTION to owners |\n| Measurement | Lower of CA and FVLCTS | Lower of CA and FVLCTD |\n| Acquirer | Third party | Entity's own owners |" },

  { id:50, standard:"Ind AS 105", category:"Theory Q&A", difficulty:"Basic", exam:false,
    front:"Ind AS 105 вЂ“ Ind AS 105 vs AS 24: Key Differences\n\nState 4 key differences between Ind AS 105 and old AS 24 (Discontinuing Operations).",
    back:"1. Scope:\n   Ind AS 105 в†’ covers BOTH held for sale assets AND discontinued operations as one standard\n   AS 24 в†’ covered only discontinuing operations; no separate standard for HFS assets\n\n2. Definition:\n   Ind AS 105 в†’ 'discontinued operation' = component already disposed of or classified as HFS (binary)\n   AS 24 в†’ 'discontinuing operation' = ongoing process; disclosures from point of initial disclosure\n\n3. Measurement:\n   Ind AS 105 в†’ explicit measurement at lower of CA and FVLCTS; cessation of depreciation\n   AS 24 в†’ no specific measurement requirements for assets to be sold\n\n4. P&L Presentation:\n   Ind AS 105 в†’ single line item on face of P&L (post-tax)\n   AS 24 в†’ no specific single-line presentation requirement\n\n5. Comparative restatement:\n   Ind AS 105 в†’ prior period comparative P&L MUST be restated\n   AS 24 в†’ no mandatory comparative restatement\n\n6. Abandonment:\n   Ind AS 105 в†’ assets to be abandoned CANNOT be classified as HFS (may meet discontinued criteria)\n   AS 24 в†’ abandonment could qualify as a discontinuing operation" },

  { id:51, standard:"Ind AS 105", category:"Formula", difficulty:"Intermediate", exam:true,
    front:"Ind AS 105 вЂ“ Formula Card\n\nA property: cost в‚№4,70,000, life 13 years (SL), acquired 1 April 20X1.\nOn 1 April 20X4 classified as HFS. FVLCTS at 31 March 20X4 = в‚№1,00,000.\nOn 31 March 20X5 FVLCTS = в‚№85,000.\nSold 30 Sept 20X5 for в‚№90,000.\n\nCalculate: (1) CA before classification, (2) Impairment on classification, (3) Position at 31 March 20X5, (4) Gain on sale.",
    back:"Annual depreciation = в‚№4,70,000 Г· 13 = в‚№36,154\n\n(1) CA immediately before classification (end of Year 3 = 31 March 20X4):\nCA = в‚№4,70,000 в€’ (3 Г— в‚№36,154) = в‚№4,70,000 в€’ в‚№1,08,462 = в‚№3,61,538 в‰€ в‚№3,62,000\n\n(2) Impairment on classification (1 April 20X4):\nFVLCTS = в‚№1,00,000; CA = в‚№3,62,000\nImpairment = в‚№3,62,000 в€’ в‚№1,00,000 = в‚№2,62,000 в†’ recognised in P&L\nAsset carried at в‚№1,00,000\n\nNote: Depreciation STOPS from date of HFS classification.\n\n(3) 31 March 20X5:\nFVLCTS falls to в‚№85,000\nAdditional impairment = в‚№1,00,000 в€’ в‚№85,000 = в‚№15,000 в†’ P&L\nAsset carried at в‚№85,000\n\n(4) Sale 30 Sept 20X5 at в‚№90,000:\nGain = в‚№90,000 в€’ в‚№85,000 = в‚№5,000 в†’ recognised in P&L\n(Within cumulative impairment loss = в‚№2,77,000; gain в‚№5,000 is within this limit)" },

  { id:52, standard:"Ind AS 105", category:"Quick Fire", difficulty:"Basic", exam:true,
    front:"Ind AS 105 вЂ“ Quick Fire\n\n1. HFS assets measured at: ___\n2. Depreciation on HFS assets: ___ (continues/stops)\n3. HFS assets in balance sheet: presented as ___ assets\n4. P&L вЂ” discontinued operations shown as: ___\n5. Asset to be ABANDONED: ___ (can/cannot) be HFS\n6. Comparative balance sheet: ___ restated\n7. Comparative P&L: ___ restated",
    back:"1. HFS assets: LOWER OF carrying amount AND FVLCTS\n\n2. Depreciation: STOPS on classification as HFS\n\n3. HFS in balance sheet: CURRENT assets (separately from other assets)\n\n4. P&L вЂ” discontinued ops: SINGLE AMOUNT (post-tax total of P&L + gain/loss on disposal)\n\n5. Asset to be abandoned: CANNOT be classified as HFS\n\n6. Comparative balance sheet: NOT restated\n\n7. Comparative P&L: RESTATED to show discontinued operations separately\n\nBonus:\nв†’ Assets & liabilities of disposal group в†’ cannot be offset (shown GROSS)\nв†’ 'Component' = operations and CFs clearly distinguishable from rest of entity\nв†’ Highly probable = significantly more likely than probable\nв†’ Loss of control in subsidiary в†’ ALL assets & liabilities of subsidiary classified as HFS\nв†’ Interest on liabilities of disposal group в†’ continues to accrue after HFS classification" },

  // PRACTICAL вЂ“ IND AS 2
  { id:53, standard:"Ind AS 2", category:"Practical", difficulty:"Intermediate", exam:true,
    front:"Ind AS 2 вЂ“ Practical: By-Product NRV & Joint Cost Allocation\n[Illustration 8 вЂ“ Mars Ltd]\n\nCosts: Raw material в‚№1,50,000 | Wages в‚№90,000 | Fixed O/H в‚№65,000 | Variable O/H в‚№50,000\nOutput: MP1 вЂ“ 5,000 units | MP2 вЂ“ 4,000 units | BP вЂ“ 2,000 units | Scrap realised в‚№5,000\nClosing stock: MP1 вЂ“ 250 units | MP2 вЂ“ 100 units\nMarket price: MP1 @ в‚№60/unit | MP2 @ в‚№50/unit | BP @ в‚№20/unit\nSeparate processing (BP): в‚№8,000 | Packing (BP): в‚№2,000\n\nCalculate closing stock values of MP1 and MP2.",
    back:"Step 1 вЂ“ NRV of By-product BP:\nSelling price: 2,000 Г— в‚№20 = в‚№40,000\nLess: Processing в‚№8,000 + Packing в‚№2,000 = (в‚№10,000)\nNRV of BP = в‚№30,000\n\nStep 2 вЂ“ Joint cost for allocation:\nTotal costs (1,50,000+90,000+65,000+50,000) = 3,55,000\nLess NRV of BP (30,000) and scrap (5,000) = (35,000)\nJoint cost = 3,20,000\n\nStep 3 вЂ“ Allocation on relative sales value (ratio 3:2):\n             MP1         MP2\nUnits        5,000       4,000\nPrice        в‚№60         в‚№50\nSales value  3,00,000    2,00,000\nAllocation   1,92,000    1,28,000\nCost/unit    в‚№38.40      в‚№32.00\n\nStep 4 вЂ“ Closing stock:\nMP1: 250 Г— в‚№38.40 = в‚№9,600\nMP2: 100 Г— в‚№32.00 = в‚№3,200" },

  { id:54, standard:"Ind AS 2", category:"Practical", difficulty:"Basic", exam:true,
    front:"Ind AS 2 вЂ“ Practical: FIFO vs Weighted Average\n[Illustration 11 вЂ“ Mercury Ltd]\n\nMercury Ltd periodic inventory system 20X1-20X2:\nApril     Opening inventory  200 units @ в‚№10 = в‚№2,000\nMay       Purchase           50 units @ в‚№11 = в‚№550\nSeptember Purchase          400 units @ в‚№12 = в‚№4,800\nFebruary  Purchase          350 units @ в‚№14 = в‚№4,900\nTotal                       1,000 units      в‚№12,250\n\nPhysical inventory at 31.3.20X2: 400 units.\nCalculate closing inventory and cost of sales under (a) FIFO and (b) Weighted Average.",
    back:"(a) FIFO Method:\nClosing inventory (400 units вЂ“ most recent purchases first):\n350 units @ в‚№14 = в‚№4,900\n50 units @ в‚№12  = в‚№600\nClosing inventory = в‚№5,500\nCost of sales = в‚№12,250 в€’ в‚№5,500 = в‚№6,750\n\n(b) Weighted Average:\nWA cost = в‚№12,250 Г· 1,000 = в‚№12.25 per unit\nClosing inventory = 400 Г— в‚№12.25 = в‚№4,900\nCost of sales = в‚№12,250 в€’ в‚№4,900 = в‚№7,350\n\nComparison:\n                  FIFO      Wtd Avg\nClosing inventory в‚№5,500    в‚№4,900\nCost of sales     в‚№6,750    в‚№7,350\n\nIn a RISING price environment: FIFO gives higher closing inventory and lower COGS.\nLIFO is NOT permitted under Ind AS 2." },

  { id:55, standard:"Ind AS 2", category:"Practical", difficulty:"Basic", exam:true,
    front:"Ind AS 2 вЂ“ Practical: NRV Item-by-Item vs Group Basis\n[Illustration 17 вЂ“ Sun Pharma Ltd]\n\nItem   Cost    NRV\nA      2,000   1,900\nB      5,000   5,100\nC      4,400   4,550\nD      3,200   2,990\nTotal  14,600  14,540\n\nCalculate inventory value on (a) item-by-item basis and (b) group basis.\nWhich is CORRECT as per Ind AS 2? What is the write-down?",
    back:"(a) ITEM-BY-ITEM BASIS (CORRECT per Ind AS 2):\n\nItem  Cost   NRV    Lower    Basis\nA     2,000  1,900  1,900    NRV < cost в†’ write down в‚№100\nB     5,000  5,100  5,000    Cost < NRV в†’ no write down\nC     4,400  4,550  4,400    Cost < NRV в†’ no write down\nD     3,200  2,990  2,990    NRV < cost в†’ write down в‚№210\nTotal                14,290\n\nTotal write-down = в‚№100 + в‚№210 = в‚№310\n\n(b) GROUP BASIS (NOT permitted вЂ” shown only to explain concept):\nTotal cost (14,600) vs Total NRV (14,540)\nGroup value = в‚№14,540\n\nInd AS 2 requires item-by-item в†’ correct answer is в‚№14,290.\nGroup basis (в‚№14,540) overstates inventory by allowing surpluses on B & C to offset write-downs on A & D." },

  // PRACTICAL вЂ“ IND AS 36
  { id:56, standard:"Ind AS 36", category:"Practical", difficulty:"Basic", exam:true,
    front:"Ind AS 36 вЂ“ Practical: Impairment Loss Calculation\n[Illustration 4 вЂ“ Jupiter Ltd]\n\nJupiter Ltd has a furnace on the balance sheet at в‚№250 lakh (31 March 20X1).\nAt that date: Value in Use = в‚№200 lakh | Fair value = в‚№200 lakh | Cost of disposal = в‚№13 lakh.\n\nCalculate the impairment loss.",
    back:"Step 1 вЂ“ FVLCD:\nFVLCD = Fair value в€’ Cost of disposal = в‚№200L в€’ в‚№13L = в‚№187 lakh\n\nStep 2 вЂ“ Recoverable Amount:\nRA = Higher of FVLCD and VIU = Higher of в‚№187L and в‚№200L = в‚№200 lakh\n\nStep 3 вЂ“ Impairment Loss:\nIL = Carrying Amount в€’ Recoverable Amount = в‚№250L в€’ в‚№200L = в‚№50 lakh\n\nRecognition: в‚№50 lakh recognised immediately in Profit or Loss (cost model asset).\n\nKey points:\nFVLCD (в‚№187L) < VIU (в‚№200L) в†’ VIU is used as RA, which reduces impairment.\nFVLCD в‰  Fair Value. Always deduct costs of disposal.\nAfter recognition: revised CA = в‚№200L; depreciation adjusted going forward." },

  { id:57, standard:"Ind AS 36", category:"Practical", difficulty:"Intermediate", exam:true,
    front:"Ind AS 36 вЂ“ Practical: CGU Impairment + Reversal\n[Illustration 10 вЂ“ Venus Ltd / Saturn Ltd]\n\nVenus Ltd acquired 100% Saturn Ltd on 1 April 20X1 for в‚№4,00,000.\nFV of identifiable assets = в‚№3,20,000 | Goodwill = в‚№80,000 | Life 20 years SL, no residual.\n\n31 March 20X3 (Year 2): Govt cancelled licences. VIU = в‚№2,12,000.\n31 March 20X5 (Year 4): Licences reinstated. VIU = в‚№3,04,000 | FVLCD = в‚№2,90,000.\n\nCalculate: (a) Impairment at 31.3.20X3 and allocation, (b) Reversal at 31.3.20X5.",
    back:"(a) Impairment at 31 March 20X3 (Year 2):\n\nCGU Carrying Amounts:\nGoodwill = в‚№80,000 (not depreciated)\nOther assets = в‚№3,20,000 в€’ (в‚№16,000 Г— 2) = в‚№2,88,000\nTotal CGU CA = в‚№3,68,000\n\nRA = VIU = в‚№2,12,000\nImpairment Loss = в‚№3,68,000 в€’ в‚№2,12,000 = в‚№1,56,000\n\nAllocation:\n1st в†’ Goodwill fully eliminated: (в‚№80,000)\n2nd в†’ Other assets: (в‚№76,000)\nRevised CA of other assets: в‚№2,88,000 в€’ в‚№76,000 = в‚№2,12,000\n\n(b) Reversal at 31 March 20X5 (Year 4):\n\nCA of other assets at 31.3.20X5:\nRevised dep = в‚№2,12,000 Г· 18 years Г— 2 в‰€ в‚№24,000 (rounded)\nCA = в‚№2,12,000 в€’ в‚№24,000 = в‚№1,88,000\n\nReversal CEILING (CA had no impairment at Year 4):\nв‚№3,20,000 в€’ (в‚№16,000 Г— 4) = в‚№3,20,000 в€’ в‚№64,000 = в‚№2,56,000\n\nRA at reversal = max(в‚№3,04,000, в‚№2,90,000) = в‚№3,04,000\nReversal = min(в‚№3,04,000, в‚№2,56,000) в€’ в‚№1,88,000 = в‚№68,000\n\nNew CA = в‚№2,56,000 | New annual dep = в‚№2,56,000 Г· 16 = в‚№16,000\nGoodwill impairment в‚№80,000 в†’ CANNOT be reversed." },

  { id:58, standard:"Ind AS 36", category:"Theory Q&A", difficulty:"Basic", exam:false,
    front:"Ind AS 36 вЂ“ AS 28 vs Ind AS 36\n\nState 4 key differences between Ind AS 36 and old AS 28.",
    back:"1. Fair Value Measurement Standard:\nInd AS 36 в†’ uses Ind AS 113 Fair Value Measurement to determine FV in FVLCD\nAS 28 в†’ no separate FV measurement standard; FV determined under AS 28 itself\n\n2. NCI Goodwill Grossing Up:\nInd AS 36 в†’ specific guidance on grossing up partially recognised goodwill (partial goodwill method) before impairment test\nAS 28 в†’ no such guidance\n\n3. Scope Exclusions:\nInd AS 36 в†’ excludes assets per Ind AS 109, 12, 19, 41, 115, 117, 105 (new Ind AS framework)\nAS 28 в†’ exclusions aligned to old AS framework equivalents\n\n4. Discount Rate Guidance:\nInd AS 36 в†’ detailed guidance on surrogates (WACC, incremental borrowing rate) when asset-specific rate unavailable\nAS 28 в†’ similar in principle but less detailed\n\n5. Reversal of goodwill impairment:\nInd AS 36 в†’ PROHIBITS reversal of goodwill impairment вЂ” NEVER reversible\nAS 28 в†’ ALLOWS reversal IF caused by a specific external event of exceptional nature not expected to recur AND subsequent external events reverse the effect of that event\n\n6. Annual impairment test:\nInd AS 36 в†’ MANDATORY annual test for goodwill + indefinite-life intangibles + intangibles not yet available for use (regardless of indicators)\nAS 28 в†’ does NOT require mandatory annual testing for goodwill; tests only when there is an INDICATION of impairment" },

  // PRACTICAL вЂ“ IND AS 105
  { id:59, standard:"Ind AS 105", category:"Practical", difficulty:"Intermediate", exam:true,
    front:"Ind AS 105 вЂ“ Practical: Reclassification Out of HFS\n[Illustration 2 вЂ“ S Ltd]\n\nS Ltd purchased property в‚№6,00,000 on 1 April 20X1. Useful life 15 years SL.\n\n31 March 20X3 (Year 2): Classified as HFS.\nImpairment testing before classification: RA = в‚№4,70,000 (impairment в‚№50,000)\nFVLCTS = в‚№4,60,000. Asset recorded at в‚№4,60,000.\n\n31 March 20X4 (Year 3): Plan abandoned вЂ” HFS criteria no longer met.\nRecoverable amount at 31.3.20X4 = в‚№5,00,000.\n\nCalculate: (a) P&L charges for year 31.3.20X3, (b) Value of property at 31.3.20X4.",
    back:"(a) 31 March 20X3 вЂ” Year of HFS Classification:\n\nCA before classification per Ind AS 16:\nCost                                  в‚№6,00,000\nLess: Dep 2 years (6,00,000/15Г—2)     (в‚№80,000)\nLess: Impairment loss (5,20,000в€’4,70,000) (в‚№50,000)\nCA after impairment testing           в‚№4,70,000\n\nOn HFS classification: Lower of CA (в‚№4,70,000) and FVLCTS (в‚№4,60,000) = в‚№4,60,000\nAdditional HFS write-down = в‚№10,000\n\nTotal charged to P&L in Year 20X3:\nDepreciation в‚№40,000 + Impairment в‚№60,000 (в‚№50,000 + в‚№10,000) = в‚№1,00,000\nProperty recorded at в‚№4,60,000\n\n(b) 31 March 20X4 вЂ” Reclassification back:\n\nNotional depreciation catch-up (1 year):\nCA immediately before HFS = в‚№4,70,000 (pre-HFS write-down CA)\nRemaining life = 13 years; Annual dep = в‚№4,70,000 Г· 13 = в‚№36,154\nAdjusted CA = в‚№4,70,000 в€’ в‚№36,154 = в‚№4,33,846\n\nLower of adjusted CA (в‚№4,33,846) and RA (в‚№5,00,000) = в‚№4,33,846\n\nAdjustment to P&L (continuing operations):\nв‚№4,60,000 в€’ в‚№4,33,846 = в‚№26,154 charged to P&L" },

  { id:60, standard:"Ind AS 105", category:"Concept", difficulty:"Intermediate", exam:false,
    front:"Ind AS 105 вЂ“ Disclosures for HFS Assets & Discontinued Operations\n\nWhat must be disclosed for (a) non-current assets held for sale and (b) discontinued operations?",
    back:"(a) HFS non-current assets (or disposal groups):\n1. Description of the asset / disposal group\n2. Facts and circumstances of the sale; expected manner and timing\n3. Gain/loss on initial or subsequent write-down (if not on face of P&L в†’ caption used)\n4. Reportable segment (Ind AS 108)\n5. If there is a CHANGE OF PLAN:\n   Description of facts/circumstances; effect on results\n\nNote: Prior period comparative BALANCE SHEET в†’ NOT restated.\n\n(b) Discontinued operations:\n1. Description of the discontinued operation\n2. Segment in which reported\n3. Date and manner of disposal\n4. Gain/loss on disposal (before/after tax)\n5. Cash flows: Operating | Investing | Financing\n   (In notes or on face of cash flow statement)\n6. Revenue, expenses, pre-tax P&L for the period\n7. Related income tax expense\n8. Consideration received/receivable; net assets disposed of\n\nNote: Prior period comparative P&L в†’ MUST be restated for discontinued operations." },
];

    <div style={{ background:"#1e293b", borderRadius:12, padding:"8px 16px", display:"flex", flexDirection:"column", alignItems:"center", gap:2 }}>
      <span style={{color:"#a5b4fc",fontSize:20,fontWeight:700}}>{num}</span>
      <span style={{color:"#64748b",fontSize:11,fontFamily:"Arial,sans-serif"}}>{lbl}</span>
