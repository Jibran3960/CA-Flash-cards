  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Scrollbar hide */

      margin: 0 20px;
      height: 390px;

    .face-back {

      border-color: #14532d;
      -webkit-transform: rotateY(180deg);
      transform: rotateY(180deg);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .filter-scroll {
      display: flex;
      gap: 6px;
      padding: 0 20px;
      overflow-x: auto;
      -ms-overflow-style: none;
      scrollbar-width: none;

  { id:11, category:"Formula", difficulty:"Basic",

  { id:16, category:"Formula", difficulty:"Advanced",

const CATEGORIES = ["All","Concept","Formula","Practical","Theory Q&A","Quick Fire"];
const CAT_COLORS = {
  Concept:"#3B82F6", Formula:"#8B5CF6", Practical:"#F59E0B",
  "Theory Q&A":"#10B981", "Quick Fire":"#EF4444"
};
const DIFF_COLORS = { Basic:"#22C55E", Intermediate:"#F59E0B", Advanced:"#EF4444" };

function App() {
  const [page, setPage] = useState("home");    // home | study | stats
  const [selCat, setSelCat] = useState("All");
  const [examOnly, setExamOnly] = useState(false);
  const [deck, setDeck] = useState(cards);
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [known, setKnown] = useState(new Set());
  const [unknown, setUnknown] = useState(new Set());
  const [shuffled, setShuffled] = useState(false);
  const touchX = useRef(null);
  const touchY = useRef(null);

  // Rebuild deck whenever filters change
  useEffect(() => {
    let f = cards;
    if (selCat !== "All") f = f.filter(c => c.category === selCat);
    if (examOnly) f = f.filter(c => c.exam);
    if (shuffled) f = [...f].sort(() => Math.random() - 0.5);
    setDeck(f);
    setIdx(0);
    setFlipped(false);
  }, [selCat, examOnly, shuffled]);

  const cur = deck[idx] || null;
  const progress = deck.length ? Math.round((idx / deck.length) * 100) : 0;
  const knownCount = [...known].filter(id => deck.find(c => c.id === id)).length;
  const unknownCount = [...unknown].filter(id => deck.find(c => c.id === id)).length;

  const go = (dir) => {
    setFlipped(false);
    setTimeout(() => {
      setIdx(i => {
        if (dir === 1 && i < deck.length - 1) return i + 1;
        if (dir === -1 && i > 0) return i - 1;
        return i;
      });
    }, 80);
  };

  const mark = (type) => {
    if (!cur) return;
    if (type === "know") {
      setKnown(s => new Set([...s, cur.id]));
      setUnknown(s => { const n = new Set(s); n.delete(cur.id); return n; });
    } else {
      setUnknown(s => new Set([...s, cur.id]));
      setKnown(s => { const n = new Set(s); n.delete(cur.id); return n; });
    }
    go(1);
  };

  const startStudy = (cat, examOnlyMode) => {
    setSelCat(cat);
    setExamOnly(examOnlyMode || false);
    setShuffled(false);
    setIdx(0);
    setFlipped(false);
    setPage("study");
  };

  const onTouchStart = (e) => {
    touchX.current = e.touches[0].clientX;
    touchY.current = e.touches[0].clientY;
  };
  const onTouchEnd = (e) => {
    if (touchX.current === null) return;
    const dx = e.changedTouches[0].clientX - touchX.current;
    const dy = Math.abs(e.changedTouches[0].clientY - touchY.current);
    touchX.current = null;
    if (dy > 50) return;
    if (dx < -50) go(1);
    else if (dx > 50) go(-1);
  };

  // в”Ђв”Ђ HOME в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  if (page === "home") return (
    <div style={S.page}>
      <div style={S.homeWrap}>
        {/* Header */}
        <div style={S.header}>
          <div style={S.badge}>CA FINALS В· GROUP I В· AFM</div>
          <div style={S.title}>Mutual Funds</div>
          <div style={S.subtitle}>Chapter 8 В· Advanced Financial Management</div>
          <div style={S.statsRow}>
            <Pill num={cards.length} lbl="Cards"/>
            <Pill num={5} lbl="Categories"/>
            <Pill num={cards.filter(c=>c.exam).length} lbl="Exam Qs"/>
          </div>
        </div>

        {/* Category grid */}
        <div style={S.grid}>
          {CATEGORIES.filter(c=>c!=="All").map(c => (
            <button key={c} style={{...S.catCard, borderColor: CAT_COLORS[c]}}
              onClick={() => startStudy(c, false)}>
              <div style={{...S.catDot, background: CAT_COLORS[c]}}/>
              <div style={S.catName}>{c}</div>
              <div style={S.catCnt}>{cards.filter(x=>x.category===c).length} cards</div>
            </button>
          ))}
        </div>

        <button style={S.mainBtn} onClick={() => startStudy("All", false)}>
          Study All 38 Cards в†’
        </button>
        <button style={{...S.mainBtn, ...S.outlineBtn}} onClick={() => startStudy("All", true)}>
          вљЎ Exam Questions Only
        </button>
        <button style={{...S.mainBtn, ...S.statsBtn}} onClick={() => setPage("stats")}>
          рџ“Љ View Progress
        </button>
      </div>
    </div>
  );

  // в”Ђв”Ђ STATS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  if (page === "stats") {
    const pct = Math.round(knownCount / (deck.length || 1) * 100);
    return (
      <div style={S.page}>
        <div style={S.homeWrap}>
          <button style={S.backBtn} onClick={() => setPage("home")}>в†ђ Back</button>
          <div style={{...S.title, marginBottom:24}}>Your Progress</div>
          <div style={S.statsDetail}>
            <div style={S.statBlock}>
              <div style={{...S.bigNum, color:"#22C55E"}}>{knownCount}</div>
              <div style={S.bigLbl}>вњ… Know It</div>
            </div>
            <div style={S.statBlock}>
              <div style={{...S.bigNum, color:"#EF4444"}}>{unknownCount}</div>
              <div style={S.bigLbl}>рџ”Ѓ Review</div>
            </div>
            <div style={S.statBlock}>
              <div style={{...S.bigNum, color:"#64748b"}}>{deck.length - knownCount - unknownCount}</div>
              <div style={S.bigLbl}>вЏі Unseen</div>
            </div>
          </div>
          <div style={S.pBarWrap}>
            <div style={{...S.pBarFill, width:`${pct}%`, background:"linear-gradient(90deg,#22C55E,#86efac)"}}/>
          </div>
          <div style={{color:"#94a3b8", textAlign:"center", fontSize:13, marginTop:8, fontFamily:"Arial,sans-serif"}}>
            {pct}% mastered
          </div>
          {unknownCount > 0 && (
            <button style={{...S.mainBtn, marginTop:28}}
              onClick={() => {
                const ids = new Set([...unknown].filter(id => deck.find(c=>c.id===id)));
                setDeck(prev => prev.filter(c => ids.has(c.id)));
                setIdx(0); setFlipped(false); setPage("study");
              }}>
              рџ”Ѓ Review Weak Cards ({unknownCount})
            </button>
          )}
          <button style={{...S.mainBtn, ...S.outlineBtn, marginTop:10}}
            onClick={() => { setKnown(new Set()); setUnknown(new Set()); }}>
            Reset Progress
          </button>
        </div>
      </div>
    );
  }

  // в”Ђв”Ђ STUDY в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  return (
    <div style={S.page} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
      {/* Top Bar */}
      <div style={S.topBar}>
        <button style={S.iconBtn} onClick={() => { setExamOnly(false); setPage("home"); }}>рџЏ </button>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
          <div style={{color:"#e2e8f0",fontSize:14,fontWeight:600,fontFamily:"Arial,sans-serif"}}>
            {idx+1} / {deck.length}
          </div>
          {cur && <div style={{...S.diffBadge, background: DIFF_COLORS[cur.difficulty]||"#666"}}>{cur.difficulty}</div>}
        </div>
        <button style={S.iconBtn} onClick={() => setPage("stats")}>рџ“Љ</button>
      </div>

      {/* Filter pills */}
      <div style={{width:"100%", paddingBottom:8}}>
        <div className="filter-scroll">
          {CATEGORIES.map(c => (
            <button key={c} style={{
              ...S.pill,
              background: selCat===c ? (CAT_COLORS[c]||"#3B82F6") : "#1e293b",
              color: selCat===c ? "#fff" : "#94a3b8",
            }} onClick={() => setSelCat(c)}>{c}</button>
          ))}
        </div>
      </div>

      {/* Progress bar */}
      <div style={S.pTrack}>
        <div style={{...S.pFill, width:`${progress}%`}}/>
      </div>

      {/* Card */}
      {cur ? (
        <div className="card-area no-select" onClick={() => setFlipped(f=>!f)}>
          <div className={`card${flipped?" flipped":""}`}>
            <div className="face face-front">
              <div style={{...S.catTag, background: CAT_COLORS[cur.category]||"#555"}}>{cur.category}</div>
              {cur.exam && <div style={S.examTag}>вљЎ EXAM Q</div>}
              <div style={S.question}>{cur.front}</div>
              <div style={S.tapHint}>Tap to reveal answer</div>
            </div>
            <div className="face face-back">
              <div style={{...S.catTag, background: CAT_COLORS[cur.category]||"#555"}}>{cur.category}</div>
              <div style={S.answer}>{cur.back}</div>
            </div>
          </div>
        </div>
      ) : (
        <div style={S.emptyState}>
          <div style={{fontSize:48}}>рџЋ‰</div>
          <div style={{color:"#fff",fontSize:18,fontWeight:700,marginTop:12}}>All Done!</div>
          <div style={{color:"#94a3b8",fontSize:14,marginTop:6,fontFamily:"Arial,sans-serif"}}>You've reviewed all cards in this set</div>
          <button style={{...S.mainBtn, marginTop:24}} onClick={() => { setIdx(0); setFlipped(false); }}>Restart</button>
        </div>
      )}

      {/* Mark buttons вЂ” only when flipped */}
      {flipped && cur && (
        <div style={S.actionRow}>
          <button style={S.noBtn} onClick={(e)=>{ e.stopPropagation(); mark("dontknow"); }}>
            <span style={{fontSize:20}}>рџ”Ѓ</span>
            <span style={{color:"#e2e8f0",fontSize:12,fontFamily:"Arial,sans-serif",fontWeight:600}}>Review Again</span>
          </button>
          <button style={S.yesBtn} onClick={(e)=>{ e.stopPropagation(); mark("know"); }}>
            <span style={{fontSize:20}}>вњ…</span>
            <span style={{color:"#e2e8f0",fontSize:12,fontFamily:"Arial,sans-serif",fontWeight:600}}>Got It!</span>
          </button>
        </div>
      )}

      {/* Nav row */}
      <div style={S.navRow}>
        <button style={{...S.navBtn, opacity: idx===0 ? 0.3:1}} onClick={() => go(-1)} disabled={idx===0}>вЂ№ Prev</button>
        <button style={S.shuffleBtn} onClick={() => setShuffled(s=>!s)}>
          {shuffled ? "рџ”Ђ Shuffled" : "рџ”Ђ Shuffle"}
        </button>
        <button style={{...S.navBtn, opacity: idx>=deck.length-1 ? 0.3:1}} onClick={() => go(1)} disabled={idx>=deck.length-1}>Next вЂє</button>
      </div>

      {/* Status label */}
      <div style={{minHeight:28, display:"flex", justifyContent:"center", alignItems:"center", marginBottom:8, paddingBottom:"env(safe-area-inset-bottom,12px)"}}>
        {cur && known.has(cur.id) && <span style={{color:"#22C55E",fontSize:12,fontFamily:"Arial,sans-serif"}}>вњ… Marked as known</span>}
        {cur && unknown.has(cur.id) && <span style={{color:"#EF4444",fontSize:12,fontFamily:"Arial,sans-serif"}}>рџ”Ѓ Needs review</span>}
        {cur && !known.has(cur.id) && !unknown.has(cur.id) && <span style={{color:"#475569",fontSize:12,fontFamily:"Arial,sans-serif"}}>Swipe left/right or use buttons</span>}
      </div>
    </div>
  );
}

function Pill({ num, lbl }) {
  return (
    <div style={{ background:"#1e293b", borderRadius:12, padding:"8px 16px", display:"flex", flexDirection:"column", alignItems:"center", gap:2 }}>
      <span style={{color:"#a5b4fc",fontSize:20,fontWeight:700}}>{num}</span>
      <span style={{color:"#64748b",fontSize:11,fontFamily:"Arial,sans-serif"}}>{lbl}</span>
    </div>
  );
}
