  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow-x: hidden; }
    body {
      background: #0A0F1E;
      font-family: 'Georgia', 'Times New Roman', serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    #root { height: 100%; }

    /* Scrollbar hide */
    ::-webkit-scrollbar { display: none; }

    /* Card flip */
    .card-area {
      width: calc(100% - 40px);
      margin: 0 20px;
      height: 390px;
      -webkit-perspective: 1200px;
      perspective: 1200px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .card {
      width: 100%;
      height: 100%;
      position: relative;
      -webkit-transform-style: preserve-3d;
      transform-style: preserve-3d;
      -webkit-transition: -webkit-transform 0.5s cubic-bezier(0.4,0,0.2,1);
      transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
      border-radius: 20px;
    }
    .card.flipped {
      -webkit-transform: rotateY(180deg);
      transform: rotateY(180deg);
    }
    .face {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 20px;
      padding: 22px 20px;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid;
      overflow: hidden;
    }
    .face-front {
      background: linear-gradient(145deg, #0f172a 0%, #1e1b4b 100%);
      border-color: #312e81;
      justify-content: center;
    }
    .face-back {
      background: linear-gradient(145deg, #0f1929 0%, #0c1a0f 100%);
      border-color: #14532d;
      -webkit-transform: rotateY(180deg);
      transform: rotateY(180deg);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Filter scroll */
    .filter-scroll {
      display: flex;
      gap: 6px;
      padding: 0 20px;
      overflow-x: auto;
      -ms-overflow-style: none;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .filter-scroll::-webkit-scrollbar { display: none; }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.25s ease; }

    /* Prevent text selection on tap */
    .no-select { -webkit-user-select: none; user-select: none; }

const cards = [
  // в”Җв”Җ CONCEPT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  { id:1, category:"Concept", difficulty:"Basic",
    front:"What is Portfolio Management? What are its 3 core activities?",
    back:"Portfolio Management = Process of selecting, constructing and continuously managing an optimal mix of investments that best suits an investor's risk-return profile.\n\nрҹ“Ң Based on the principle: 'Don't put all eggs in the same basket'\n\n3 Core Activities:\n1пёҸвғЈ Selection of Securities\n2пёҸвғЈ Construction of all Feasible Portfolios from selected securities\n3пёҸвғЈ Deciding optimal weights/proportions for each security\n\nGoal: Build an Optimal Portfolio commensurate with the investor's risk appetite.",
    exam:false },

  { id:2, category:"Concept", difficulty:"Basic",
    front:"What are the 7 Objectives of Portfolio Management?",
    back:"1. рҹ”’ Safety of Principal\nKeep principal intact including its purchasing power\n\n2. рҹ“Ҡ Stability of Income\nFacilitate accurate planning and reinvestment\n\n3. рҹ“Ҳ Capital Growth\nVia reinvestment in growth securities\n\n4. рҹ”„ Marketability\nEase of buying/selling вҖ” essential for flexibility\n\n5. рҹ’§ Liquidity\nNearness to money вҖ” to exploit attractive opportunities\n\n6. рҹҢҗ Diversification\nReduce risk of loss of capital/income across securities & industries\n\n7. рҹ’° Favourable Tax Status\nMinimise tax burden вҶ’ improve effective yield\n\nрҹ“Ң Exam Tip: Write each with 1-line explanation for 4-mark theory Qs.",
    exam:false },

  { id:3, category:"Concept", difficulty:"Basic",
    front:"What are the 5 Phases of Portfolio Management?",
    back:"1пёҸвғЈ Security Analysis\nвҶ’ Examine risk-return characteristics of individual securities\nвҶ’ Use Fundamental Analysis (intrinsic value) or Technical Analysis (price patterns)\nвҶ’ Goal: Identify underpriced (buy) / overpriced (sell) securities\n\n2пёҸвғЈ Portfolio Analysis\nвҶ’ Compute risk-return for each possible combination (Feasible Portfolios)\n\n3пёҸвғЈ Portfolio Selection\nвҶ’ Identify Efficient Portfolios вҶ’ Select Optimal Portfolio per investor's risk appetite\n\n4пёҸвғЈ Portfolio Revision\nвҶ’ Add/remove securities as market conditions or investor needs change\n\n5пёҸвғЈ Portfolio Evaluation\nвҶ’ Measure actual return vs. risk over time\nвҶ’ Use Sharpe, Treynor, Jensen's Alpha ratios\n\nрҹ“Ң All 5 phases are an ongoing, continuous cycle.",
    exam:false },

  { id:4, category:"Concept", difficulty:"Intermediate",
    front:"Differentiate: Systematic Risk vs Unsystematic Risk",
    back:"рҹ“Ҡ SYSTEMATIC RISK (Market Risk / Non-Diversifiable)\nвҶ’ Caused by macro/external factors affecting ALL companies\nвҶ’ Cannot be eliminated by diversification\nвҶ’ Sub-types:\n  вҖў Interest Rate Risk: вҶ‘ interest rate вҶ’ вҶ“ security price\n  вҖў Purchasing Power (Inflation) Risk: Erodes real return\n  вҖў Market Risk: General market upswings/downswings (Bull/Bear)\n\nрҹ“Ң UNSYSTEMATIC RISK (Idiosyncratic / Diversifiable)\nвҶ’ Caused by micro/internal factors specific to a company\nвҶ’ CAN be eliminated through diversification\nвҶ’ Sub-types:\n  вҖў Business Risk: Variability in operating profits (measured by Operating Leverage)\n  вҖў Financial Risk: Presence of debt; measured by Debt-Equity Ratio\n\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nTotal Risk = Systematic Risk + Unsystematic Risk\n\nрҹ“Ң Beta (ОІ) measures ONLY Systematic Risk.",
    exam:true },

  { id:5, category:"Concept", difficulty:"Intermediate",
    front:"Traditional Approach vs Modern Approach (Markowitz) to Portfolio Theory",
    back:"рҹ“ң Traditional Approach:\nвҶ’ Focuses on investor profile: age, income, liquidity, tax, risk attitude\nвҶ’ Diversify across different securities/assets вҶ’ assumed enough\nвҶ’ Balances equities vs fixed income, high dividend vs growth stocks\nвҶ’ Relies on fundamental/technical analysis + expert advice\nвҶ’ Flaw: Any diversification was considered beneficial\n\nрҹ”¬ Modern Approach (Markowitz, 1950s):\nвҶ’ Proved random diversification is NOT optimal\nвҶ’ Key Insight: Correlation between securities matters\nвҶ’ Same expected return can be achieved at LOWER risk by choosing correctly correlated assets\nвҶ’ Provides mathematical framework: Optimize Risk-Return using Mean-Variance analysis\nвҶ’ Lower/negative correlation between assets вҶ’ greater risk reduction\n\nрҹ“Ң Markowitz questioned 'any basket is fine' вҖ” proved 'the RIGHT basket matters'.",
    exam:false },

  { id:6, category:"Concept", difficulty:"Intermediate",
    front:"What is the Efficient Frontier? What is the Optimal Portfolio?",
    back:"рҹ“җ Efficient Portfolio:\nвҶ’ Highest return for a given level of risk, OR\nвҶ’ Lowest risk for a given level of return\n\nрҹ“Ҳ Efficient Frontier:\nвҶ’ The curve connecting ALL efficient portfolios on a risk-return graph\nвҶ’ Any portfolio BELOW the frontier is suboptimal (dominated)\nвҶ’ All points on the frontier are equally 'efficient' вҖ” choice depends on investor's risk appetite\n\nKey Points on the Frontier:\nвҖў Point A (bottom): Minimum Variance Portfolio вҖ” lowest possible risk\nвҖў Point D (top): Maximum return portfolio вҖ” also highest risk\n\nвӯҗ Optimal Portfolio:\nвҶ’ The specific point on the Efficient Frontier that matches the investor's indifference curve\nвҶ’ Varies across investors (different risk appetite = different optimal portfolio)\n\nрҹ“Ң Markowitz: 'Move to the frontier вҖ” then choose your risk level'",
    exam:false },

  { id:7, category:"Concept", difficulty:"Intermediate",
    front:"What is the Capital Asset Pricing Model (CAPM)? What are its key assumptions?",
    back:"рҹ“Ҡ CAPM: Links expected return of an asset to its systematic risk (Beta)\nFormula: Rj = Rf + ОІ(Rm вҲ’ Rf)\n\nKey Assumptions:\n1. Efficient Market вҖ” prices reflect full information; assets fairly priced\n2. Rational Investors вҖ” prefer higher return for same risk; risk-averse\n3. All assets divisible and liquid\n4. Investors can borrow/lend freely at risk-free rate\n5. Homogeneous expectations вҖ” all investors see same risk-return\n6. No taxes or transaction costs\n7. Single-period investment horizon\n8. Total risk = Systematic + Unsystematic; unsystematic can be diversified away\n\nрҹ“Ң CAPM says: Compensation is given ONLY for Systematic Risk (Beta)\nрҹ“Ң Unsystematic risk вҶ’ not compensated since it can be diversified away.",
    exam:true },

  { id:8, category:"Concept", difficulty:"Intermediate",
    front:"What is the Arbitrage Pricing Theory (APT)? How does it differ from CAPM?",
    back:"рҹ“Ҡ APT (Ross): Multi-factor model for expected return\nFormula: E(R) = Rf + О»вӮҒОІвӮҒ + О»вӮӮОІвӮӮ + вҖҰ + О»вӮҷОІвӮҷ\n\nWhere:\nвҖў О»вӮҷ = Risk premium for nth macro factor\nвҖў ОІвӮҷ = Sensitivity to that factor\n\nRoss's 4 Key Factors:\nвҖў Changes in Inflation\nвҖў Level of Industrial Production\nвҖў Risk Premium (spread between T-bills and long bonds)\nвҖў Term Structure of Interest Rates\n\nрҹҶҡ APT vs CAPM:\nвҖў CAPM = ONE factor (market beta)\nвҖў APT = MULTIPLE macro factors\nвҖў APT doesn't need market portfolio assumption\nвҖў APT more realistic but harder to implement (which factors?)\nвҖў Both give same result in equilibrium for well-diversified portfolios\n\nрҹ“Ң APT surprise formula: E(R) = Rf + ОЈ ОІвӮҷ(EVвӮҷ вҲ’ AVвӮҷ) when unexpected changes occur.",
    exam:false },

  { id:9, category:"Concept", difficulty:"Advanced",
    front:"What is Capital Market Theory? What is the Capital Market Line (CML)?",
    back:"рҹ“Ҳ Capital Market Theory extends Markowitz by introducing a Risk-Free Asset.\n\nKey Insight: When investors can borrow/lend at risk-free rate, the efficient frontier changes to a straight line вҖ” the Capital Market Line (CML).\n\nрҹ“җ CML Formula:\nE(Rp) = Rf + [(Rm вҲ’ Rf) / Пғm] Г— Пғp\n\nWhere:\nвҖў Rf = Risk-free rate\nвҖў Rm = Market return\nвҖў Пғm = SD of market\nвҖў Пғp = SD of portfolio\n\nSlope of CML = (Rm вҲ’ Rf) / Пғm = Reward per unit of TOTAL risk\n\nPortfolios on CML:\nвҖў Rf to M = Lending portfolios (part in risk-free + part in market portfolio)\nвҖў M to Z = Borrowing portfolios (borrow at Rf to invest more in market)\n\nрҹҶҡ CML vs SML:\nвҖў CML вҶ’ uses Пғ (total risk) вҶ’ only for EFFICIENT portfolios\nвҖў SML вҶ’ uses Beta (systematic risk) вҶ’ for ALL securities & portfolios",
    exam:true },

  { id:10, category:"Concept", difficulty:"Intermediate",
    front:"What is Sharpe's Single Index Model? How does it decompose risk?",
    back:"рҹ“Ҡ Sharpe's Single Index Model assumes stock returns move together ONLY due to the common market index.\n\nReturn Equation:\nRi = Оұi + ОІi Г— Rm + Оөi\n\nWhere:\nвҖў Оұi = Intercept (return independent of market)\nвҖў ОІi = Slope (sensitivity to market)\nвҖў Оөi = Error term (unsystematic component)\n\nRisk Decomposition:\nвҖў Systematic Risk = ОІiВІ Г— ПғmВІ\nвҖў Unsystematic Risk (ОөiВІ) = Total Variance вҲ’ Systematic Risk\nвҖў Also = Variance Г— (1 вҲ’ rВІ) where r = correlation with market\n\nPortfolio Variance:\nПғpВІ = (ОЈXiОІi)ВІ Г— ПғmВІ + ОЈ(XiВІ Г— ОөiВІ)\n\nрҹ“Ң rВІ = Coefficient of Determination вҶ’ % of return variation explained by market\nрҹ“Ң ОІi = 1.5 means stock return changes 1.5% for every 1% change in market",
    exam:true },

  // в”Җв”Җ FORMULA в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  { id:11, category:"Formula", difficulty:"Basic",
    front:"рҹ“җ Expected Return Formula вҖ” Probability-based & Historical",
    back:"рҹ“Ҡ When Probabilities Given:\nE(R) = ОЈ [Xi Г— p(Xi)]\n= Sum of (each possible return Г— its probability)\n\nExample:\nReturns: 20%, 30%, 40%, 50%, 60%\nProb:     0.20, 0.20, 0.40, 0.10, 0.10\nE(R) = (0.20Г—0.20)+(0.30Г—0.20)+(0.40Г—0.40)+(0.50Г—0.10)+(0.60Г—0.10)\n     = 0.04+0.06+0.16+0.05+0.06 = 0.37 = 37%\n\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nрҹ“Ҡ When Historical Data Given:\nE(R) = (xвӮҒ + xвӮӮ + вҖҰ + xвӮҷ) / n\n= Simple Arithmetic Mean\n\nExample:\nReturns: 9.5, 7.0, 11.0, вҲ’6.0, 2.5\nSum = 24.00 вҶ’ Mean = 24/5 = 4.80%\n\nрҹ“Ң Use probability-weighted for forward-looking; use mean for historical data.",
    exam:true },

  { id:12, category:"Formula", difficulty:"Basic",
    front:"рҹ“җ Variance & Standard Deviation Formula (Risk Measurement)",
    back:"рҹ“Ҡ When Probabilities Given:\nПғВІ = ОЈ [(Xi вҲ’ XМ„)ВІ Г— p(Xi)]\n\nExample:\nE(R) = 37%; Using above data:\nПғВІ = 0.0289Г—0.20 + 0.0049Г—0.20 + 0.0009Г—0.40 + 0.0169Г—0.10 + 0.0529Г—0.10\n   = 0.00578 + 0.00098 + 0.00036 + 0.00169 + 0.00529\n   = 0.0141\nПғ = вҲҡ0.0141 = 11.87%\n\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nрҹ“Ҡ When Historical Data Given:\nПғВІ = ОЈ (xi вҲ’ xМ„)ВІ / n\n\nExample:\nReturns: 9.5, 7.0, 11.0, вҲ’6.0, 2.5 вҶ’ Mean = 4.80\nОЈ(deviationsВІ) = 22.09+4.84+38.44+116.64+5.29 = 187.30\nПғВІ = 187.30/5 = 37.46 вҶ’ Пғ = 6.12%\n\nрҹ“Ң Пғ = Standard Deviation = Square root of Variance\nрҹ“Ң Higher Пғ = Higher Risk",
    exam:true },

  { id:13, category:"Formula", difficulty:"Intermediate",
    front:"рҹ“җ Portfolio Return & Portfolio Risk (2-Asset Portfolio) вҖ” Complete Formulas",
    back:"рҹ“Ҡ Portfolio Return:\nRp = wвӮҒRвӮҒ + wвӮӮRвӮӮ\n(Weighted average of individual returns)\n\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nрҹ“Ҡ Portfolio Variance:\nПғpВІ = wвӮҒВІПғвӮҒВІ + wвӮӮВІПғвӮӮВІ + 2wвӮҒwвӮӮrвӮҒвӮӮПғвӮҒПғвӮӮ\n\nWhere:\nвҖў wвӮҒ, wвӮӮ = weights\nвҖў ПғвӮҒ, ПғвӮӮ = standard deviations\nвҖў rвӮҒвӮӮ = correlation coefficient\n\n3 Special Cases:\nвң… r = +1 вҶ’ Пғp = wвӮҒПғвӮҒ + wвӮӮПғвӮӮ (maximum risk, no benefit)\nвң… r = вҲ’1 вҶ’ Пғp = |wвӮҒПғвӮҒ вҲ’ wвӮӮПғвӮӮ| (minimum risk, can reach 0)\nвң… r = 0  вҶ’ Пғp = вҲҡ(wвӮҒВІПғвӮҒВІ + wвӮӮВІПғвӮӮВІ) (moderate reduction)\n\nрҹ“Ң Risk reduction is GREATEST when correlation is NEGATIVE\nрҹ“Ң r = вҲ’1 вҶ’ Perfect negative correlation вҶ’ Portfolio can be fully risk-free",
    exam:true },

  { id:14, category:"Formula", difficulty:"Intermediate",
    front:"рҹ“җ Covariance & Correlation Coefficient вҖ” Formulas & Interpretation",
    back:"рҹ“Ҡ Covariance Formula (Historical):\nCovAB = ОЈ[(RA вҲ’ RМ„A)(RB вҲ’ RМ„B)] / N\n\nExample:\nYear: 1  2  3  4\nRx: 11 13 17 19 вҶ’ RМ„x = 15\nRy: 18 14 11  9 вҶ’ RМ„y = 13\nProducts: вҲ’20, вҲ’2, вҲ’4, вҲ’16 вҶ’ Sum = вҲ’42\nCov = вҲ’42/4 = вҲ’10.5\n\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nрҹ“Ҡ Correlation Coefficient:\nr = CovAB / (ПғA Г— ПғB)\n\nInterpretation:\nвҖў r = +1: Returns move perfectly TOGETHER\nвҖў r = вҲ’1: Returns move perfectly OPPOSITE\nвҖў r = 0: Returns are INDEPENDENT (no relationship)\nвҖў вҲ’1 < r < 0: Partial negative correlation вҶ’ best for diversification\n\nрҹ“Ң Covariance shows direction of relationship; Correlation shows MAGNITUDE (вҲ’1 to +1)\nрҹ“Ң Negative covariance вҶ’ excellent for portfolio risk reduction",
    exam:true },

  { id:15, category:"Formula", difficulty:"Advanced",
    front:"рҹ“җ CAPM / Security Market Line (SML) Formula & Beta Calculation",
    back:"рҹ“Ҡ CAPM Formula (SML):\nRj = Rf + ОІj Г— (Rm вҲ’ Rf)\n\nWhere:\nвҖў Rj = Required return on security j\nвҖў Rf = Risk-free rate\nвҖў ОІj = Beta of security j\nвҖў (Rm вҲ’ Rf) = Market Risk Premium\n\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nрҹ“Ҡ Beta Calculation:\nОІ = Cov(Ri, Rm) / ПғmВІ\n   = (Пғi Г— r) / Пғm\n\nAlternatively via regression:\nОІ = [ОЈXY вҲ’ nВ·XМ„В·ИІ] / [ОЈYВІ вҲ’ nВ·ИІВІ]\n(where X = security returns, Y = market returns)\n\nрҹ“Ң ОІ = 1: Moves with market\nрҹ“Ң ОІ > 1: More volatile than market (Aggressive Stock)\nрҹ“Ң ОІ < 1: Less volatile than market (Defensive Stock)\nрҹ“Ң ОІ = 0: Risk-free asset\n\nExample:\nRf = 5%, Rm = 13%, ОІ = 1.2\nRj = 5 + 1.2(13 вҲ’ 5) = 5 + 9.6 = 14.6%",
    exam:true },

  { id:16, category:"Formula", difficulty:"Advanced",
    front:"рҹ“җ Sharpe Ratio, Treynor Ratio & Jensen's Alpha вҖ” All Three Formulas",
    back:"рҹ“Ҡ Sharpe Ratio:\nS = (Rp вҲ’ Rf) / Пғp\nвҶ’ Risk Premium per unit of TOTAL Risk (SD)\nвҶ’ Suitable for non-fully-diversified or overall portfolios\nвҶ’ Higher = Better\n\nрҹ“Ҡ Treynor Ratio:\nT = (Rp вҲ’ Rf) / ОІp\nвҶ’ Risk Premium per unit of SYSTEMATIC Risk (Beta)\nвҶ’ Suitable for well-diversified portfolios\nвҶ’ Higher = Better\n\nрҹ“Ҡ Jensen's Alpha:\nОұ = Rp вҲ’ [Rf + ОІp(Rm вҲ’ Rf)]\n= Actual Return вҲ’ CAPM Required Return\n\nInterpretation:\nвҖў Оұ > 0: Portfolio OUTPERFORMED (good manager)\nвҖў Оұ < 0: Portfolio UNDERPERFORMED\nвҖў Оұ = 0: Performed exactly per market risk\n\nрҹ“Ң If Sharpe & Treynor give SAME ranking вҶ’ perfectly diversified\nрҹ“Ң If rankings DIFFER вҶ’ some unsystematic risk exists",
    exam:true },

  { id:17, category:"Formula", difficulty:"Advanced",
    front:"рҹ“җ Sharpe's Optimal Portfolio вҖ” Excess Return to Beta (Ci & C*) Formula",
    back:"Steps to Build Sharpe's Optimal Portfolio:\n\n1пёҸвғЈ Calculate Excess Return to Beta ratio for each stock:\n   (Ri вҲ’ Rf) / ОІi   вҶҗ Treynor's ratio for individual stocks\n\n2пёҸвғЈ Rank all stocks from highest to lowest ratio\n\n3пёҸвғЈ Calculate Ci for each ranked stock:\nCi = [ПғmВІ Г— ОЈ{(RiвҲ’Rf)ОІi / ПғОөiВІ}] / [1 + ПғmВІ Г— ОЈ{ОІiВІ / ПғОөiВІ}]\n\nWhere ПғОөiВІ = Unsystematic variance of stock i\n\n4пёҸвғЈ C* = Highest value of Ci вҶ’ Cut-off Rate\n\n5пёҸвғЈ Include all stocks where (RiвҲ’Rf)/ОІi > C*\n\n6пёҸвғЈ Weights:\nZi = (ОІi/ПғОөiВІ) Г— [(RiвҲ’Rf)/ОІi вҲ’ C*]\nXi = Zi / ОЈZi\n\nрҹ“Ң C* is the threshold: only stocks ABOVE C* make it into the portfolio\nрҹ“Ң Once C* known, all higher-ranked stocks auto-qualify",
    exam:true },

  { id:18, category:"Formula", difficulty:"Intermediate",
    front:"рҹ“җ APT Formula & Surprise Factor Variant",
    back:"рҹ“Ҡ Standard APT:\nE(Ri) = Rf + О»вӮҒОІвӮҒ + О»вӮӮОІвӮӮ + вҖҰ + О»вӮҷОІвӮҷ\n\nWhere:\nвҖў О»вӮҷ = Risk premium for each macro factor\nвҖў ОІвӮҷ = Sensitivity to that factor\n\nExample (ICAI Illustration):\nRisk-free rate = 8%\nFactor 1 (Market): О» = 4%, ОІ = 1.3\nFactor 2 (Growth): О» = 1%, ОІ = 0.3\nFactor 3 (Inflation): О» = вҲ’4%, ОІ = 0.2\n\nE(R) = 8% + 1.3Г—4% + 0.3Г—1% + 0.2Г—(вҲ’4%)\n     = 8% + 5.2% + 0.3% вҲ’ 0.8%\n     = 12.7%\n\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nрҹ“Ҡ APT with Surprise Factors:\nE(R) = Rf + ОЈОІвӮҷ(EVвӮҷ вҲ’ AVвӮҷ)\n\nWhere (EV вҲ’ AV) = Unexpected change in factor\n\nрҹ“Ң If no surprises occur вҶ’ Actual return = Expected return\nрҹ“Ң Ross's 4 factors: Inflation, Industrial Production, Risk Premium, Interest Rate Term Structure",
    exam:true },

  // в”Җв”Җ PRACTICAL в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  { id:19, category:"Practical", difficulty:"Intermediate",
    front:"рҹ§® EXAM Q: Rf = 5%, Rm = 13%. Portfolio: 70% T-bills + 30% Market. Find Beta and Required Return.",
    back:"Step 1 вҖ” Beta of Portfolio:\nBeta of T-bills = 0 (risk-free)\nBeta of Market = 1.0\n\nPortfolio ОІ = 0.70 Г— 0 + 0.30 Г— 1 = 0.30\n\nStep 2 вҖ” Required Return (CAPM):\nRj = Rf + ОІ(Rm вҲ’ Rf)\n   = 5% + 0.30 Г— (13% вҲ’ 5%)\n   = 5% + 0.30 Г— 8%\n   = 5% + 2.4%\n   = 7.40%\n\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nрҹ“Ң Market Risk Premium = Rm вҲ’ Rf = 13% вҲ’ 5% = 8%\nрҹ“Ң Beta is always the WEIGHTED AVERAGE of individual betas\nрҹ“Ң Adding T-bills LOWERS portfolio beta and therefore LOWERS required return",
    exam:true },

  { id:20, category:"Practical", difficulty:"Intermediate",
    front:"рҹ§® Rf = 10%, Rm = 15%, ОІ = 1.2. Projected return = 18%. Is stock correctly valued? What's your strategy?",
    back:"Step 1 вҖ” Required Return (CAPM):\nRj = Rf + ОІ(Rm вҲ’ Rf)\n   = 10 + 1.2 Г— (15 вҲ’ 10)\n   = 10 + 6 = 16%\n\nStep 2 вҖ” Compare:\nRequired (CAPM) = 16%\nProjected Return = 18%\n\nProjected > Required вҶ’ Stock is UNDERVALUED\n(Gives more return than it should for its risk level)\n\nStep 3 вҖ” Decision:\nвң… BUY the stock\n\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nрҹ“Ң Decision Rules:\nвҖў Projected > CAPM Required вҶ’ Undervalued вҶ’ BUY\nвҖў Projected < CAPM Required вҶ’ Overvalued вҶ’ SELL\nвҖў Projected = CAPM Required вҶ’ Correctly Valued вҶ’ HOLD\n\nрҹ“Ң From price angle:\nвҖў Actual Price < CAPM Price вҶ’ Undervalued\nвҖў Actual Price > CAPM Price вҶ’ Overvalued",
    exam:true },

  { id:21, category:"Practical", difficulty:"Intermediate",
    front:"рҹ§® Security SD = 25%, Market SD = 15%, Correlation = 0.8. Find Beta. If Rf = 6%, Rm = 14%, find required return.",
    back:"Step 1 вҖ” Beta:\nОІ = (Пғi Г— r) / Пғm\n  = (25% Г— 0.8) / 15%\n  = 20% / 15%\n  = 1.333\n\nStep 2 вҖ” Required Return (CAPM):\nRj = Rf + ОІ(Rm вҲ’ Rf)\n   = 6 + 1.333 Г— (14 вҲ’ 6)\n   = 6 + 1.333 Г— 8\n   = 6 + 10.67\n   = 16.67%\n\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nрҹ“Ң Alternative Beta Formula:\nОІ = Cov(i, m) / Var(m)\n  = (Пғi Г— r Г— Пғm) / ПғmВІ\n  = (Пғi Г— r) / Пғm вҶҗ same result\n\nрҹ“Ң ОІ > 1 вҶ’ stock is more volatile than market (aggressive)\nрҹ“Ң Risk Premium earned = ОІ Г— Market Risk Premium",
    exam:true },

  { id:22, category:"Practical", difficulty:"Advanced",
    front:"рҹ§® Portfolio has 50% in X (Пғ=вҲҡ6.30) and 50% in Y (Пғ=вҲҡ5.86). Market variance = 2.25. ОІx=0.71, ОІy=0.685. Unsystematic: X=5.166, Y=4.804. Find portfolio variance.",
    back:"Using Sharpe Single Index Model:\nПғpВІ = (ОЈXiОІi)ВІ Г— ПғmВІ + ОЈ(XiВІ Г— ОөiВІ)\n\nStep 1 вҖ” Systematic component:\nОЈXiОІi = 0.5 Г— 0.71 + 0.5 Г— 0.685\n       = 0.355 + 0.3425 = 0.6975\n\n(0.6975)ВІ Г— 2.25 = 0.4865 Г— 2.25 = 1.094\n\nStep 2 вҖ” Unsystematic component:\n(0.5)ВІ Г— 5.166 + (0.5)ВІ Г— 4.804\n= 0.25 Г— 5.166 + 0.25 Г— 4.804\n= 1.2915 + 1.201 = 2.493\n\nStep 3 вҖ” Portfolio Variance:\nПғpВІ = 1.094 + 2.493 = 3.587\n\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nрҹ“Ң Single Index model greatly simplifies computation vs full Markowitz covariance matrix\nрҹ“Ң Requires only betas + unsystematic variances (not every pair's covariance)",
    exam:true },

  { id:23, category:"Practical", difficulty:"Advanced",
    front:"рҹ§® EXAM Q: Portfolio A: Return=30%, SD=11%. Portfolio B: Return=25%, SD=5%. Rf=8%. Which is better using Sharpe Ratio?",
    back:"Sharpe Ratio = (Rp вҲ’ Rf) / Пғp\n\nPortfolio A:\nSA = (30% вҲ’ 8%) / 11% = 22/11 = 2.00\n\nPortfolio B:\nSB = (25% вҲ’ 8%) / 5% = 17/5 = 3.40\n\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nвң… Portfolio B is BETTER (Sharpe = 3.4 > 2.0)\n\nExplanation:\nAlthough A has higher absolute return (30% > 25%),\nB generates MORE return PER UNIT OF RISK.\nB has significantly lower volatility (SD = 5% vs 11%).\n\nрҹ“Ң Sharpe Ratio corrects for risk вҖ” don't judge by return alone!\nрҹ“Ң Rule: Higher Sharpe = Better risk-adjusted performance\nрҹ“Ң Use this ratio especially when comparing OVERALL portfolios",
    exam:true },

  { id:24, category:"Practical", difficulty:"Advanced",
    front:"рҹ§® Rebalancing Example: Portfolio = вӮ№1,00,000. Floor = вӮ№75,000. Multiplier = 2. Stock rises to 150 (from 100). Apply CPPI вҖ” what changes?",
    back:"Initial CPPI Setup:\nCushion = Portfolio вҲ’ Floor = 1,00,000 вҲ’ 75,000 = вӮ№25,000\nInvestment in Shares = Multiplier Г— Cushion = 2 Г— 25,000 = вӮ№50,000\nRemaining in Bonds = вӮ№50,000\n\nAfter Market rises to 150 (50% rise):\nShares value = 50,000 Г— 1.5 = вӮ№75,000\nBonds value = вӮ№50,000 (unchanged)\nNew Portfolio Value = вӮ№1,25,000\nNew Cushion = 1,25,000 вҲ’ 75,000 = вӮ№50,000\n\nNew Required Share Investment = 2 Г— 50,000 = вӮ№1,00,000\n\nвң… Action: SELL вӮ№25,000 of Bonds вҶ’ BUY вӮ№25,000 of Shares\n\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nрҹ“Ң CPPI Rule: BUY shares as they RISE; SELL shares as they FALL\nрҹ“Ң This is OPPOSITE to Constant Mix strategy (which buys falling assets)\nрҹ“Ң CPPI payoff = Convex; Constant Mix payoff = Concave",
    exam:true },

  // в”Җв”Җ THEORY Q&A в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  { id:25, category:"Theory Q&A", difficulty:"Basic",
    front:"What are the assumptions of the Markowitz Model of Portfolio Theory?",
    back:"Markowitz Model Assumptions:\n\n1. Return on investment adequately summarises the outcome of an investment\n\n2. Investors can visualise a probability distribution of rates of return\n\n3. Investors' risk estimates are proportional to the variance of return they perceive\n\n4. Investment decisions are based on TWO criteria only:\n   вҶ’ Expected Return (maximise)\n   вҶ’ Variance of Return (minimise)\n\n5. Investors are risk-averse: prefer less risk for same expected return\n\n6. Utility is a function of only mean and variance of returns\n\n7. All assets are infinitely divisible and liquid\n\nрҹ“Ң The model finds Mean-Variance Efficient portfolios вҶ’ then selects the one matching investor's indifference curve\nрҹ“Ң Limitation: Requires computing every pairwise covariance (n(nвҲ’1)/2 inputs) вҶ’ computationally intensive",
    exam:false },

  { id:26, category:"Theory Q&A", difficulty:"Intermediate",
    front:"What are the LIMITATIONS of CAPM? (5 key limitations)",
    back:"1. рҹ“җ Beta Estimation\nвҶ’ Based on historical data; ОІ in the future may differ from the past\nвҶ’ Also, estimation method (time period, market index chosen) affects ОІ\n\n2. рҹ”’ Unrealistic Assumptions\nвҶ’ Risk-free borrowing/lending at same rate is not possible in reality\nвҶ’ No taxes, no transaction costs вҶ’ impractical\n\n3. рҹ“Ҡ Systematic Risk Only\nвҶ’ CAPM ignores unsystematic risk which may still be relevant for undiversified investors\n\n4. рҹ“° Information Availability\nвҶ’ Difficult to get accurate risk-free rate (multiple T-bill rates exist)\nвҶ’ Market portfolio return changes constantly\n\n5. вҸұ Single Period Model\nвҶ’ Assumes single investment horizon вҶ’ not suitable for multi-period decisions\n\nрҹ“Ң Despite limitations, CAPM remains widely used for cost of equity, project evaluation, and portfolio benchmarking",
    exam:false },

  { id:27, category:"Theory Q&A", difficulty:"Intermediate",
    front:"Compare Active Portfolio Strategy vs Passive Portfolio Strategy",
    back:"рҹҺҜ Active Portfolio Strategy (APS):\nвҶ’ Premise: Markets are INEFFICIENT вҖ” opportunities exist\nвҶ’ Goal: OUTPERFORM market after adjusting for risk (generate positive Alpha)\nвҶ’ Methods:\n  1. Market Timing: Shift allocation based on market forecast\n  2. Sector Rotation: Overweight/underweight sectors based on outlook\n  3. Security Selection: Pick mispriced stocks via FA/TA\n  4. Specialised Concepts: Growth stocks, out-of-favour stocks, asset stocks\nвҶ’ Higher costs but potential for higher alpha\n\nрҹ“Ҡ Passive Portfolio Strategy:\nвҶ’ Premise: Markets are EFFICIENT вҖ” can't consistently beat the market\nвҶ’ Goal: Match benchmark return at lowest cost\nвҶ’ Guidelines:\n  1. Create well-diversified portfolio\n  2. Minimise transaction costs and portfolio revision\nвҶ’ Buy-and-Hold or Index replication approach\n\nрҹ“Ң Fisher Black: Investors who exit market lose relative to a simple Buy-and-Hold strategy",
    exam:false },

  { id:28, category:"Theory Q&A", difficulty:"Intermediate",
    front:"Compare the 3 Portfolio Rebalancing Policies: Buy & Hold, Constant Mix, CPPI",
    back:"рҹ“Ӣ Buy & Hold (Do Nothing):\nвҶ’ Set floor, invest remainder in stocks, NEVER rebalance\nвҶ’ Stock portion drifts with market\nвҶ’ Portfolio value LINEARLY related to stock value\nвҶ’ Payoff: Straight line (linear)\nвҶ’ Best when: stocks outperform bonds steadily\n\nрҹ”„ Constant Mix (Do Something):\nвҶ’ Maintain fixed stock:bond ratio (e.g., 60:40) always\nвҶ’ Rebalance when prices move by a set %\nвҶ’ Buy stocks when they FALL; sell when they RISE\nвҶ’ Payoff: Concave\nвҶ’ Best when: Markets are volatile/oscillating\n\nрҹӣЎ CPPI (Constant Proportion Portfolio Insurance):\nвҶ’ Set floor; invest multiplier Г— cushion in stocks\nвҶ’ Buy stocks when they RISE; sell when they FALL\nвҶ’ Payoff: Convex\nвҶ’ Best when: Trending (bull) markets\nвҶ’ Performs poorly in sharp reversals\n\nрҹ“Ң CPPI = opposite of Constant Mix\nрҹ“Ң Formula: Stock Investment = Multiplier Г— (Portfolio Value вҲ’ Floor)",
    exam:true },

  { id:29, category:"Theory Q&A", difficulty:"Intermediate",
    front:"What are Fixed Income Portfolio Management Strategies?",
    back:"рҹ“Ҡ PASSIVE Strategies:\n1. Buy & Hold: No churning; maintain initial selection; may set duration = benchmark\n2. Indexation: Replicate a predetermined bond index closely\n3. Immunization: Match duration of portfolio = investment horizon to neutralise interest rate risk. Popular in pension funds.\n4. Cash Flow Matching: Buy Zero Coupon Bonds maturing at exact dates of liabilities\n\nрҹ“Ҡ ACTIVE Strategies:\n1. Forecasting Returns/Interest Rates:\n   вҖў Bullet: Concentrate in ONE maturity (e.g., all in 5-year bonds)\n   вҖў Barbell: Equal split in SHORTEST + LONGEST maturity (e.g., 1-yr + 10-yr)\n   вҖў Ladder: Equal amounts across MULTIPLE maturities (e.g., 1yr to 5yr, 20% each)\n\n2. Yield Spread Analysis\n3. Credit Analysis\n4. Duration/Convexity Management\n\nрҹ“Ң Interest Rate vs Bond Price: Inverse relationship\nрҹ“Ң Longer duration bonds вҶ’ higher interest rate sensitivity",
    exam:false },

  { id:30, category:"Theory Q&A", difficulty:"Basic",
    front:"What are Alternative Investments (AIs)? Key features and types?",
    back:"рҹҸӣ Alternative Investments = Non-traditional asset classes beyond listed stocks/bonds\n\nKey Features:\n1. Higher Risk-Return potential vs traditional investments\n2. Low correlation with traditional markets (great diversifier)\n3. Requires specialised knowledge\n\nKey Disadvantages:\nвқҢ Illiquid вҖ” limited secondary market\nвқҢ Less Transparent вҖ” limited public information\nвқҢ Extensive research required\nвқҢ Often highly leveraged\n\nрҹ“Ӣ Types of Alternative Investments:\n1. Real Estate (tangible; land, buildings)\n2. Gold\n3. Private Equity\n4. REITs (Real Estate Investment Trusts)\n5. Hedge Funds\n6. ETFs (Exchange Traded Funds)\n7. Mutual Funds\n8. Commodities\n9. Distressed Securities\n\nрҹ“Ң Real Estate is a tangible form of asset unlike paper/demat financial claims",
    exam:false },

  { id:39, category:"Theory Q&A", difficulty:"Intermediate",
    front:"What are the 4 Asset Allocation Strategies?",
    back:"Many portfolios contain multiple asset categories. The 4 strategies are:\n\n1. рҹ”— Integrated Asset Allocation\nвҶ’ Examines BOTH capital market conditions AND investor objectives/constraints together\nвҶ’ Allocation that best serves investor's needs while incorporating market forecast\nвҶ’ Most comprehensive approach\n\n2. рҹ“Ҡ Strategic Asset Allocation\nвҶ’ Generates optimal portfolio mixes based on returns, risk & covariances using HISTORICAL data\nвҶ’ Adjusted periodically to restore target allocation\nвҶ’ Within the context of investor's objectives and constraints\n\n3. рҹ”„ Tactical Asset Allocation\nвҶ’ Investor's risk tolerance assumed CONSTANT\nвҶ’ Asset allocation changed based on expectations about CAPITAL MARKET CONDITIONS\nвҶ’ More dynamic than strategic; adjusts to market outlook\n\n4. рҹӣЎ Insured Asset Allocation\nвҶ’ Risk exposure adjusted for CHANGING PORTFOLIO VALUES (wealth)\nвҶ’ As portfolio value increases вҶ’ more risk taken; as it decreases вҶ’ less risk\nвҶ’ Similar in spirit to CPPI (protects against downside)\n\nрҹ“Ң Exam Tip: Integrated = most holistic; Tactical = market-driven; Insured = wealth-driven",
    exam:false },

  // в”Җв”Җ QUICK FIRE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  { id:31, category:"Quick Fire", difficulty:"Basic",
    front:"вҡЎ TRUE or FALSE:\n\nDiversification can eliminate ALL risk from a portfolio.",
    back:"вқҢ FALSE\n\nDiversification can ONLY eliminate UNSYSTEMATIC (diversifiable) risk.\n\nSystematic risk (market risk) CANNOT be eliminated by diversification вҖ” it affects ALL assets.\n\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nрҹ“Ң Total Risk = Systematic + Unsystematic\nвҖў As number of securities increases вҶ’ Unsystematic risk вҶ’ 0\nвҖў Systematic risk remains CONSTANT regardless of portfolio size\n\nReal-life parallel:\nNo matter how many stocks you hold вҖ” a market crash, recession or interest rate hike will still impact your portfolio.\n\nрҹ“Ң This is why CAPM says: only SYSTEMATIC RISK is priced/compensated.",
    exam:false },

  { id:32, category:"Quick Fire", difficulty:"Basic",
    front:"вҡЎ FILL IN THE BLANK:\n\nA Beta of ___ means the security moves exactly with the market. A Beta of ___ means it's twice as volatile.",
    back:"рҹ“Ң ОІ = 1.0 вҶ’ Moves EXACTLY with the market\n\nрҹ“Ң ОІ = 2.0 вҶ’ Twice as volatile as the market\n(If market rises/falls by 1%, stock rises/falls by 2%)\n\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nQuick Reference:\nвҖў ОІ > 1 вҶ’ Aggressive stock (amplifies market moves)\nвҖў ОІ < 1 вҶ’ Defensive stock (dampens market moves)\nвҖў ОІ = 0 вҶ’ Risk-free asset (no market sensitivity)\nвҖў ОІ < 0 вҶ’ Inverse to market (e.g., gold in some conditions)\n\nрҹ“Ң Weighted average beta of all market securities = 1.0\nрҹ“Ң Beta is the ONLY relevant risk measure in CAPM\nрҹ“Ң Beta for T-bills / Government Securities = 0",
    exam:false },

  { id:33, category:"Quick Fire", difficulty:"Intermediate",
    front:"вҡЎ MATCH: Which formula uses which risk measure?\n\nA. CML (Capital Market Line)\nB. SML (Security Market Line)\nC. Sharpe Ratio\nD. Treynor Ratio",
    back:"A. CML вҶ’ Uses Пғp (TOTAL risk вҖ” Standard Deviation of Portfolio)\nвҶ’ Only for EFFICIENT PORTFOLIOS on the efficient frontier\n\nB. SML вҶ’ Uses ОІ (SYSTEMATIC risk вҖ” Beta)\nвҶ’ For ALL securities and portfolios (efficient or not)\n\nC. Sharpe Ratio вҶ’ Uses Пғp (Total Risk / Standard Deviation)\nвҶ’ Risk premium per unit of TOTAL risk\n\nD. Treynor Ratio вҶ’ Uses ОІ (Beta / Systematic Risk)\nвҶ’ Risk premium per unit of SYSTEMATIC risk\n\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nрҹ“Ң Memory Trick:\nвҖў CML & Sharpe вҶ’ Standard Deviation (Total Risk)\nвҖў SML & Treynor вҶ’ Beta (Systematic Risk)\n\nрҹ“Ң CML applies ONLY to efficient portfolios\nрҹ“Ң SML applies to ANY security (efficient or not)",
    exam:false },

  { id:34, category:"Quick Fire", difficulty:"Intermediate",
    front:"вҡЎ What happens when r (correlation) between two assets = вҲ’1, 0, and +1?",
    back:"рҹ“Ҡ Correlation = +1 (Perfect Positive):\nвҶ’ Assets move EXACTLY together\nвҶ’ NO diversification benefit\nвҶ’ Пғp = wвӮҒПғвӮҒ + wвӮӮПғвӮӮ (maximum portfolio risk)\n\nрҹ“Ҡ Correlation = 0 (Independent):\nвҶ’ Returns are UNRELATED\nвҶ’ Moderate diversification benefit\nвҶ’ Пғp = вҲҡ(wвӮҒВІПғвӮҒВІ + wвӮӮВІПғвӮӮВІ)\n\nрҹ“Ҡ Correlation = вҲ’1 (Perfect Negative):\nвҶ’ Assets move EXACTLY opposite\nвҶ’ MAXIMUM diversification benefit\nвҶ’ Portfolio can be made RISK-FREE!\nвҶ’ Пғp = |wвӮҒПғвӮҒ вҲ’ wвӮӮПғвӮӮ|\nвҶ’ Zero risk when: wвӮҒ/wвӮӮ = ПғвӮӮ/ПғвӮҒ\n\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nрҹ“Ң In real life, most assets have correlation between 0 and +1\nрҹ“Ң Perfect вҲ’1 correlation is extremely rare\nрҹ“Ң Even partial negative correlation meaningfully reduces portfolio risk",
    exam:false },

  { id:35, category:"Quick Fire", difficulty:"Intermediate",
    front:"вҡЎ IDENTIFY: Jensen's Alpha = +2%. What does this tell you about the fund manager?",
    back:"вң… Alpha = +2% вҶ’ POSITIVE ALPHA\n\nвҶ’ The portfolio OUTPERFORMED the CAPM expected return by 2%\nвҶ’ The fund manager generated EXCESS RETURN above what the market risk justified\nвҶ’ Indicates superior fund management / stock-picking ability\n\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nFormula Reminder:\nОұ = Actual Rp вҲ’ [Rf + ОІ(Rm вҲ’ Rf)]\n  = Actual Return вҲ’ CAPM Required Return\n\nInterpretation:\nвҖў Оұ > 0 вҶ’ Manager OUTPERFORMED вң… (skilled manager)\nвҖў Оұ = 0 вҶ’ Manager matched CAPM expectation вҡ–пёҸ\nвҖў Оұ < 0 вҶ’ Manager UNDERPERFORMED вқҢ (poor manager)\n\nрҹ“Ң Short-term alpha (< 1 year) is not valid вҖ” minimum 3-year period needed for reliable judgment\nрҹ“Ң Positive alpha = Fund manager adding value above market compensation for risk",
    exam:false },

  { id:36, category:"Quick Fire", difficulty:"Basic",
    front:"вҡЎ What is the difference between Feasible Portfolio, Efficient Portfolio and Optimal Portfolio?",
    back:"рҹ“Ұ Feasible Portfolio:\nвҶ’ Any possible combination of chosen securities\nвҶ’ ALL portfolios that can be constructed (the entire shaded region on the risk-return graph)\nвҶ’ Most are suboptimal\n\nвӯҗ Efficient Portfolio:\nвҶ’ A feasible portfolio that is NOT dominated\nвҶ’ Either: Highest return for a given risk level\nвҶ’ Or: Lowest risk for a given return level\nвҶ’ Lies on the EFFICIENT FRONTIER (the curved boundary)\n\nрҹҺҜ Optimal Portfolio:\nвҶ’ The SINGLE best portfolio for a SPECIFIC investor\nвҶ’ Point where investor's indifference curve is TANGENT to the Efficient Frontier\nвҶ’ Different for different investors (depends on risk appetite)\n\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nрҹ“Ң Hierarchy: Feasible вҠғ Efficient вҠғ Optimal (1 point)\nрҹ“Ң Optimal portfolio is UNIQUE per investor",
    exam:false },

  { id:37, category:"Quick Fire", difficulty:"Intermediate",
    front:"вҡЎ Which type of analysis is best under which Market Efficiency level?\n(Technical / Fundamental / Random Selection)",
    back:"Market Efficiency Level вҶ’ Best Approach:\n\n1пёҸвғЈ Inefficient Market\nвҶ’ Best: Technical Analysis\nвҶ’ Past patterns are useful; mispricing exists and persists\n\n2пёҸвғЈ Weak Form Efficiency\nвҶ’ Best: Fundamental Analysis\nвҶ’ Price history = no edge; but fundamentals can still reveal value\n\n3пёҸвғЈ Semi-Strong Form Efficiency\nвҶ’ Best: Fundamental Analysis (still good)\nвҶ’ All public info reflected in price; fundamentals + private info helps\n\n4пёҸвғЈ Strong Form Efficiency\nвҶ’ Best: Random Selection\nвҶ’ ALL info (including insider) reflected; no analysis adds value\n\nрҹ“Ң EMH = Efficient Market Hypothesis\nрҹ“Ң In practice, markets are NEVER perfectly efficient\nрҹ“Ң Random Walk Theory: Share price movements are random; neither FA nor TA gives sustained advantage",
    exam:false },

  { id:38, category:"Quick Fire", difficulty:"Basic",
    front:"вҡЎ Full forms & 1-line meaning:\nCAPM | CML | SML | APT | EMH | CPPI | APS",
    back:"рҹ“Ӣ Quick Reference:\n\nCAPM вҶ’ Capital Asset Pricing Model\n(Links expected return to systematic risk via Beta)\n\nCML вҶ’ Capital Market Line\n(Risk-return line for EFFICIENT portfolios; uses SD)\n\nSML вҶ’ Security Market Line\n(Risk-return line for ALL securities; uses Beta вҖ” this IS CAPM plotted graphically)\n\nAPT вҶ’ Arbitrage Pricing Theory\n(Multi-factor alternative to CAPM; uses macro factors)\n\nEMH вҶ’ Efficient Market Hypothesis\n(Markets fully reflect available information; no consistent excess returns)\n\nCPPI вҶ’ Constant Proportion Portfolio Insurance\n(Rebalancing: buy shares as they rise; set floor value)\n\nAPS вҶ’ Active Portfolio Strategy\n(Aim to outperform market via timing, rotation, selection)\n\nрҹ“Ң SML and CML differ in risk measure вҖ” this is a COMMON MCQ trap",
    exam:false },
];

const CATEGORIES = ["All","Concept","Formula","Practical","Theory Q&A","Quick Fire"];
const CAT_COLORS = {
  Concept:"#3B82F6", Formula:"#8B5CF6", Practical:"#F59E0B",
  "Theory Q&A":"#10B981", "Quick Fire":"#EF4444"
};
const DIFF_COLORS = { Basic:"#22C55E", Intermediate:"#F59E0B", Advanced:"#EF4444" };

function App() {
  const [page, setPage] = useState("home");
  const [selCat, setSelCat] = useState("All");
  const [examOnly, setExamOnly] = useState(false);
  const [deck, setDeck] = useState(cards);
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [known, setKnown] = useState(new Set());
  const [unknown, setUnknown] = useState(new Set());
  const [shuffled, setShuffled] = useState(false);
  const touchX = useRef(null);
  const touchY = useRef(null);

  useEffect(() => {
    let f = cards;
    if (selCat !== "All") f = f.filter(c => c.category === selCat);
    if (examOnly) f = f.filter(c => c.exam);
    if (shuffled) f = [...f].sort(() => Math.random() - 0.5);
    setDeck(f);
    setIdx(0);
    setFlipped(false);
  }, [selCat, examOnly, shuffled]);

  const cur = deck[idx] || null;
  const progress = deck.length ? Math.round((idx / deck.length) * 100) : 0;
  const knownCount = [...known].filter(id => deck.find(c => c.id === id)).length;
  const unknownCount = [...unknown].filter(id => deck.find(c => c.id === id)).length;

  const go = (dir) => {
    setFlipped(false);
    setTimeout(() => {
      setIdx(i => {
        if (dir === 1 && i < deck.length - 1) return i + 1;
        if (dir === -1 && i > 0) return i - 1;
        return i;
      });
    }, 80);
  };

  const mark = (type) => {
    if (!cur) return;
    if (type === "know") {
      setKnown(s => new Set([...s, cur.id]));
      setUnknown(s => { const n = new Set(s); n.delete(cur.id); return n; });
    } else {
      setUnknown(s => new Set([...s, cur.id]));
      setKnown(s => { const n = new Set(s); n.delete(cur.id); return n; });
    }
    go(1);
  };

  const startStudy = (cat, examOnlyMode) => {
    setSelCat(cat);
    setExamOnly(examOnlyMode || false);
    setShuffled(false);
    setIdx(0);
    setFlipped(false);
    setPage("study");
  };

  const onTouchStart = (e) => {
    touchX.current = e.touches[0].clientX;
    touchY.current = e.touches[0].clientY;
  };
  const onTouchEnd = (e) => {
    if (touchX.current === null) return;
    const dx = e.changedTouches[0].clientX - touchX.current;
    const dy = Math.abs(e.changedTouches[0].clientY - touchY.current);
    touchX.current = null;
    if (dy > 50) return;
    if (dx < -50) go(1);
    else if (dx > 50) go(-1);
  };

  // в”Җв”Җ HOME в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  if (page === "home") return (
    <div style={S.page}>
      <div style={S.homeWrap}>
        {/* Header */}
        <div style={S.header}>
          <div style={S.badge}>CA FINALS В· GROUP I В· AFM</div>
          <div style={S.title}>Portfolio Management</div>
          <div style={S.subtitle}>Chapter 6 В· Advanced Financial Management</div>
          <div style={S.statsRow}>
            <Pill num={cards.length} lbl="Cards"/>
            <Pill num={5} lbl="Categories"/>
            <Pill num={cards.filter(c=>c.exam).length} lbl="Exam Qs"/>
          </div>
        </div>

        {/* Category grid */}
        <div style={S.grid}>
          {CATEGORIES.filter(c=>c!=="All").map(c => (
            <button key={c} style={{...S.catCard, borderColor: CAT_COLORS[c]}}
              onClick={() => startStudy(c, false)}>
              <div style={{...S.catDot, background: CAT_COLORS[c]}}/>
              <div style={S.catName}>{c}</div>
              <div style={S.catCnt}>{cards.filter(x=>x.category===c).length} cards</div>
            </button>
          ))}
        </div>

        <button style={S.mainBtn} onClick={() => startStudy("All", false)}>
          Study All {cards.length} Cards вҶ’

        </button>
        <button style={{...S.mainBtn, ...S.outlineBtn}} onClick={() => startStudy("All", true)}>
          вҡЎ Exam Questions Only
        </button>
        <button style={{...S.mainBtn, ...S.statsBtn}} onClick={() => setPage("stats")}>
          рҹ“Ҡ View Progress
        </button>
      </div>
    </div>
  );

  // в”Җв”Җ STATS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  if (page === "stats") {
    const pct = Math.round(knownCount / (deck.length || 1) * 100);
    return (
      <div style={S.page}>
        <div style={S.homeWrap}>
          <button style={S.backBtn} onClick={() => setPage("home")}>вҶҗ Back</button>
          <div style={{...S.title, marginBottom:24}}>Your Progress</div>
          <div style={S.statsDetail}>
            <div style={S.statBlock}>
              <div style={{...S.bigNum, color:"#22C55E"}}>{knownCount}</div>
              <div style={S.bigLbl}>вң… Know It</div>
            </div>
            <div style={S.statBlock}>
              <div style={{...S.bigNum, color:"#EF4444"}}>{unknownCount}</div>
              <div style={S.bigLbl}>рҹ”Ғ Review</div>
            </div>
            <div style={S.statBlock}>
              <div style={{...S.bigNum, color:"#64748b"}}>{deck.length - knownCount - unknownCount}</div>
              <div style={S.bigLbl}>вҸі Unseen</div>
            </div>
          </div>
          <div style={S.pBarWrap}>
            <div style={{...S.pBarFill, width:`${pct}%`, background:"linear-gradient(90deg,#22C55E,#86efac)"}}/>
          </div>
          <div style={{color:"#94a3b8", textAlign:"center", fontSize:13, marginTop:8, fontFamily:"Arial,sans-serif"}}>
            {pct}% mastered
          </div>
          {unknownCount > 0 && (
            <button style={{...S.mainBtn, marginTop:28}}
              onClick={() => {
                const ids = new Set([...unknown].filter(id => deck.find(c=>c.id===id)));
                setDeck(prev => prev.filter(c => ids.has(c.id)));
                setIdx(0); setFlipped(false); setPage("study");
              }}>
              рҹ”Ғ Review Weak Cards ({unknownCount})
            </button>
          )}
          <button style={{...S.mainBtn, ...S.outlineBtn, marginTop:10}}
            onClick={() => { setKnown(new Set()); setUnknown(new Set()); }}>
            Reset Progress
          </button>
        </div>
      </div>
    );
  }

  // в”Җв”Җ STUDY в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  return (
    <div style={S.page} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
      {/* Top Bar */}
      <div style={S.topBar}>
        <button style={S.iconBtn} onClick={() => { setExamOnly(false); setPage("home"); }}>рҹҸ </button>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
          <div style={{color:"#e2e8f0",fontSize:14,fontWeight:600,fontFamily:"Arial,sans-serif"}}>
            {idx+1} / {deck.length}
          </div>
          {cur && <div style={{...S.diffBadge, background: DIFF_COLORS[cur.difficulty]||"#666"}}>{cur.difficulty}</div>}
        </div>
        <button style={S.iconBtn} onClick={() => setPage("stats")}>рҹ“Ҡ</button>
      </div>

      {/* Filter pills */}
      <div style={{width:"100%", paddingBottom:8}}>
        <div className="filter-scroll">
          {CATEGORIES.map(c => (
            <button key={c} style={{
              ...S.pill,
              background: selCat===c ? (CAT_COLORS[c]||"#3B82F6") : "#1e293b",
              color: selCat===c ? "#fff" : "#94a3b8",
            }} onClick={() => setSelCat(c)}>{c}</button>
          ))}
        </div>
      </div>

      {/* Progress bar */}
      <div style={S.pTrack}>
        <div style={{...S.pFill, width:`${progress}%`}}/>
      </div>

      {/* Card */}
      {cur ? (
        <div className="card-area no-select" onClick={() => setFlipped(f=>!f)}>
          <div className={`card${flipped?" flipped":""}`}>
            <div className="face face-front">
              <div style={{...S.catTag, background: CAT_COLORS[cur.category]||"#555"}}>{cur.category}</div>
              {cur.exam && <div style={S.examTag}>вҡЎ EXAM Q</div>}
              <div style={S.question}>{cur.front}</div>
              <div style={S.tapHint}>Tap to reveal answer</div>
            </div>
            <div className="face face-back">
              <div style={{...S.catTag, background: CAT_COLORS[cur.category]||"#555"}}>{cur.category}</div>
              <div style={S.answer}>{cur.back}</div>
            </div>
          </div>
        </div>
      ) : (
        <div style={S.emptyState}>
          <div style={{fontSize:48}}>рҹҺү</div>
          <div style={{color:"#fff",fontSize:18,fontWeight:700,marginTop:12}}>All Done!</div>
          <div style={{color:"#94a3b8",fontSize:14,marginTop:6,fontFamily:"Arial,sans-serif"}}>You've reviewed all cards in this set</div>
          <button style={{...S.mainBtn, marginTop:24}} onClick={() => { setIdx(0); setFlipped(false); }}>Restart</button>
        </div>
      )}

      {/* Mark buttons вҖ” only when flipped */}
      {flipped && cur && (
        <div style={S.actionRow}>
          <button style={S.noBtn} onClick={(e)=>{ e.stopPropagation(); mark("dontknow"); }}>
            <span style={{fontSize:20}}>рҹ”Ғ</span>
            <span style={{color:"#e2e8f0",fontSize:12,fontFamily:"Arial,sans-serif",fontWeight:600}}>Review Again</span>
          </button>
          <button style={S.yesBtn} onClick={(e)=>{ e.stopPropagation(); mark("know"); }}>
            <span style={{fontSize:20}}>вң…</span>
            <span style={{color:"#e2e8f0",fontSize:12,fontFamily:"Arial,sans-serif",fontWeight:600}}>Got It!</span>
          </button>
        </div>
      )}

      {/* Nav row */}
      <div style={S.navRow}>
        <button style={{...S.navBtn, opacity: idx===0 ? 0.3:1}} onClick={() => go(-1)} disabled={idx===0}>вҖ№ Prev</button>
        <button style={S.shuffleBtn} onClick={() => setShuffled(s=>!s)}>
          {shuffled ? "рҹ”Җ Shuffled" : "рҹ”Җ Shuffle"}
        </button>
        <button style={{...S.navBtn, opacity: idx>=deck.length-1 ? 0.3:1}} onClick={() => go(1)} disabled={idx>=deck.length-1}>Next вҖә</button>
      </div>

      {/* Status label */}
      <div style={{minHeight:28, display:"flex", justifyContent:"center", alignItems:"center", marginBottom:8, paddingBottom:"env(safe-area-inset-bottom,12px)"}}>
        {cur && known.has(cur.id) && <span style={{color:"#22C55E",fontSize:12,fontFamily:"Arial,sans-serif"}}>вң… Marked as known</span>}
        {cur && unknown.has(cur.id) && <span style={{color:"#EF4444",fontSize:12,fontFamily:"Arial,sans-serif"}}>рҹ”Ғ Needs review</span>}
        {cur && !known.has(cur.id) && !unknown.has(cur.id) && <span style={{color:"#475569",fontSize:12,fontFamily:"Arial,sans-serif"}}>Swipe left/right or use buttons</span>}
      </div>
    </div>
  );
}

function Pill({ num, lbl }) {
  return (
    <div style={{ background:"#1e293b", borderRadius:12, padding:"8px 16px", display:"flex", flexDirection:"column", alignItems:"center", gap:2 }}>
      <span style={{color:"#a5b4fc",fontSize:20,fontWeight:700}}>{num}</span>
      <span style={{color:"#64748b",fontSize:11,fontFamily:"Arial,sans-serif"}}>{lbl}</span>
    </div>
  );
}

  page: {
    minHeight: "100dvh",
    minHeight: "-webkit-fill-available",
    background: "#0A0F1E",
    display: "flex",
    flexDirection: "column",
    alignItems: "center",
    maxWidth: 430,
    margin: "0 auto",
    overflowX: "hidden",
    paddingTop: "env(safe-area-inset-top, 0px)",
  },
  homeWrap: {
    width: "100%",
    padding: "20px 20px 40px",
    display: "flex",
    flexDirection: "column",
    alignItems: "center",
    paddingBottom: "calc(40px + env(safe-area-inset-bottom, 0px))",
  },
  header: {
    width: "100%",
    background: "linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%)",
    borderRadius: 20,
    padding: "24px 20px 20px",
    textAlign: "center",
    border: "1px solid #312e81",
    marginBottom: 20,
  },
  badge: {
    background: "#312e81",
    color: "#a5b4fc",
    fontSize: 10,
    fontFamily: "Arial, sans-serif",
    letterSpacing: 2,
    padding: "4px 12px",
    borderRadius: 20,
    display: "inline-block",
    marginBottom: 10,
  },
  title: { color:"#fff", fontSize:26, fontWeight:700, letterSpacing:"-0.5px", marginBottom:4 },
  subtitle: { color:"#94a3b8", fontSize:13, fontFamily:"Arial,sans-serif", marginBottom:18 },
  statsRow: { display:"flex", gap:10, justifyContent:"center" },
  grid: {
    display: "grid",
    gridTemplateColumns: "1fr 1fr",
    gap: 10,
    width: "100%",
    marginBottom: 14,
  },
  catCard: {
    background: "#0f172a",
    border: "1.5px solid",
    borderRadius: 14,
    padding: "14px 12px",
    textAlign: "left",
    cursor: "pointer",
    display: "flex",
    flexDirection: "column",
    gap: 4,
    WebkitAppearance: "none",
